<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Storico Spedizioni · ATS14</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📜</text></svg>">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: #dfe4ee; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 14px; color: #1c1c1e; overflow-x: hidden; -webkit-font-smoothing: antialiased; }

/* ---- LOGIN ---- */
#loginScreen { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #dfe4ee; }
.login-card { background: white; border-radius: 20px; padding: 40px 32px; text-align: center; max-width: 340px; width: 90%; box-shadow: 0 4px 24px rgba(0,0,0,.12); }
.login-icon { font-size: 48px; margin-bottom: 10px; display: block; }
.login-title { font-size: 20px; font-weight: 800; color: #1e3a5f; margin-bottom: 4px; }
.login-sub { font-size: 12px; color: #8e8e93; margin-bottom: 28px; }
.btn-google { display: inline-flex; align-items: center; gap: 10px; background: white; color: #1c1c1e; border: 1.5px solid #e5e5ea; border-radius: 12px; padding: 12px 22px; font-size: 14px; font-weight: 600; cursor: pointer; width: 100%; justify-content: center; font-family: inherit; box-shadow: 0 1px 6px rgba(0,0,0,.07); transition: all .2s; }
.btn-google:hover { background: #f9f9f9; }
.btn-google svg { width: 18px; height: 18px; flex-shrink: 0; }
.login-note { font-size: 11px; color: #c7c7cc; margin-top: 14px; line-height: 1.5; }

/* ---- APP SHELL ---- */
#appShell { display: none; flex-direction: column; height: 100vh; overflow: hidden; }

/* ================================================================
   TOPBAR
================================================================ */
.topbar {
    background: linear-gradient(135deg, #1e3a5f 0%, #2d5986 100%);
    padding: 0 12px;
    display: flex; align-items: center; gap: 8px;
    flex-shrink: 0;
    box-shadow: 0 2px 10px rgba(0,0,0,.25);
    z-index: 100;
    min-height: 46px;
    flex-wrap: wrap;
}
.topbar-logo { font-size: 15px; font-weight: 800; color: white; letter-spacing: .2px; flex-shrink: 0; white-space: nowrap; padding: 8px 0; }
.topbar-logo span { opacity: .6; font-weight: 500; }
.filter-bar { display: flex; align-items: center; gap: 5px; flex: 1; flex-wrap: wrap; padding: 5px 0; min-width: 0; }
.fg { display: flex; flex-direction: column; gap: 1px; background: rgba(255,255,255,.12); border-radius: 7px; padding: 4px 8px; flex: 1; min-width: 80px; transition: background .15s; }
.fg:hover { background: rgba(255,255,255,.2); }
.fl { font-size: 9px; font-weight: 700; color: rgba(255,255,255,.5); text-transform: uppercase; letter-spacing: .6px; white-space: nowrap; }
.filter-input, .filter-select { border: none; outline: none; font-size: 12px; font-weight: 600; color: white; background: transparent; width: 100%; font-family: inherit; -webkit-appearance: none; padding: 0; cursor: pointer; }
.filter-input::placeholder { color: rgba(255,255,255,.35); }
option { background: #1e3a5f; color: white; }
.btn-cerca { background: rgba(255,255,255,.2); color: white; border: 1.5px solid rgba(255,255,255,.35); border-radius: 7px; padding: 6px 12px; font-size: 12px; font-weight: 700; cursor: pointer; font-family: inherit; white-space: nowrap; flex-shrink: 0; transition: background .15s; }
.btn-cerca:hover { background: rgba(255,255,255,.3); }
.btn-cerca:disabled { opacity: .35; cursor: not-allowed; }
.btn-reset { background: none; color: rgba(255,255,255,.45); border: 1px solid rgba(255,255,255,.2); border-radius: 7px; padding: 6px 9px; font-size: 12px; cursor: pointer; font-family: inherit; flex-shrink: 0; transition: all .15s; }
.btn-reset:hover { color: white; border-color: rgba(255,255,255,.4); }
.topbar-right { display: flex; align-items: center; gap: 6px; flex-shrink: 0; padding: 5px 0; }
.user-badge { display: flex; align-items: center; gap: 6px; background: rgba(255,255,255,.12); border-radius: 20px; padding: 3px 9px 3px 5px; font-size: 11px; color: rgba(255,255,255,.85); }
.user-avatar { width: 20px; height: 20px; border-radius: 50%; object-fit: cover; }
.user-avatar-fallback { width: 20px; height: 20px; border-radius: 50%; background: rgba(255,255,255,.22); display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 700; color: white; }
.btn-logout { background: rgba(255,255,255,.12); border: none; border-radius: 6px; padding: 5px 9px; font-size: 11px; color: rgba(255,255,255,.7); cursor: pointer; font-family: inherit; transition: background .2s; }
.btn-logout:hover { background: rgba(255,255,255,.22); color: white; }

/* ================================================================
   INFOBAR — summary + tabs
================================================================ */
.infobar {
    display: none;
    background: white;
    border-bottom: 1px solid #d1d8e8;
    padding: 0 12px;
    align-items: center;
    gap: 0;
    flex-shrink: 0;
    min-height: 38px;
    box-shadow: 0 1px 4px rgba(0,0,0,.06);
}
.infobar.show { display: flex; }
.ib-stats { display: flex; gap: 0; flex-shrink: 0; }
.ib-stat { display: flex; flex-direction: column; align-items: center; padding: 6px 14px 6px 0; margin-right: 14px; border-right: 1px solid #e5e5ea; }
.ib-stat:last-of-type { border-right: none; margin-right: 0; padding-right: 0; }
.ib-val { font-size: 16px; font-weight: 800; color: #1e3a5f; line-height: 1; }
.ib-lbl { font-size: 9px; font-weight: 600; color: #8e8e93; text-transform: uppercase; letter-spacing: .4px; margin-top: 1px; }
.ib-div { width: 1px; background: #e5e5ea; align-self: stretch; margin: 6px 10px; flex-shrink: 0; }
.ib-tabs { display: flex; gap: 2px; flex: 1; }
.ib-tab { flex: 1; padding: 6px 8px; border: none; background: none; font-size: 12px; font-weight: 600; color: #8e8e93; cursor: pointer; border-bottom: 2.5px solid transparent; transition: all .2s; display: flex; align-items: center; justify-content: center; gap: 3px; font-family: inherit; white-space: nowrap; }
.ib-tab.active { color: #007aff; border-bottom-color: #007aff; }
.badge { background: #e5e5ea; color: #8e8e93; border-radius: 8px; padding: 1px 5px; font-size: 10px; font-weight: 700; min-width: 16px; text-align: center; }
.ib-tab.active .badge { background: #e8f4ff; color: #007aff; }

/* ================================================================
   SCROLL AREA
================================================================ */
.scroll-area { flex: 1; overflow-y: auto; padding: 8px 10px 16px; -webkit-overflow-scrolling: touch; min-height: 0; }

/* ---- PANEL TOOLBAR — bottone visualizza colonne ---- */
.panel-toolbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 5px; }
.results-info { font-size: 11px; color: #8e8e93; }
.btn-toggle-cols {
    background: white; border: 1px solid #d1d8e8; border-radius: 20px;
    padding: 4px 10px; font-size: 11px; font-weight: 600; color: #636366;
    cursor: pointer; font-family: inherit; display: flex; align-items: center;
    gap: 5px; transition: all .15s; white-space: nowrap;
}
.btn-toggle-cols:hover { border-color: #007aff; color: #007aff; }
.btn-toggle-cols .arrow { transition: transform .2s; display: inline-block; }
.btn-toggle-cols.open .arrow { transform: rotate(180deg); }

/* ---- COL TOGGLE ROW (nascosta di default) ---- */
.col-toggle-wrap {
    background: white; border-radius: 10px; border: 1px solid #d1d8e8;
    padding: 8px 10px; margin-bottom: 6px;
    display: none; /* nascosta */
    flex-wrap: wrap; gap: 4px; align-items: center;
}
.col-toggle-wrap.show { display: flex; }
.ct-label { font-size: 10px; font-weight: 700; color: #8e8e93; text-transform: uppercase; letter-spacing: .4px; flex-shrink: 0; margin-right: 2px; width: 100%; margin-bottom: 2px; }
.ct-btn { border: 1px solid #d1d8e8; background: #f4f6fa; border-radius: 20px; padding: 3px 9px; font-size: 11px; font-weight: 600; color: #8e8e93; cursor: pointer; font-family: inherit; transition: all .15s; white-space: nowrap; }
.ct-btn:hover { border-color: #007aff; color: #007aff; }
.ct-btn.on { background: #007aff; border-color: #007aff; color: white; }

/* ---- TABLE ---- */
.tab-panel { display: none; }
.tab-panel.on { display: block; }
.tbl-card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,.07); }
.tbl-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 12px; }
thead tr:first-child th { font-size: 9px; font-weight: 700; letter-spacing: .7px; text-transform: uppercase; color: #8e8e93; padding: 7px 10px 2px; border-right: .5px solid #e5e5ea; background: #f4f6fa; white-space: nowrap; }
thead tr:last-child th { font-size: 11px; font-weight: 600; color: #3c3c43; padding: 2px 10px 7px; border-right: .5px solid #e5e5ea; background: #f4f6fa; white-space: nowrap; border-bottom: 1px solid #d8dde8; }
thead th:last-child { border-right: none !important; }
tbody tr { border-bottom: .5px solid #e8ecf2; transition: background .1s; }
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: rgba(0,122,255,.04); }
td { padding: 7px 10px; border-right: .5px solid #ebeef4; white-space: nowrap; max-width: 200px; overflow: hidden; text-overflow: ellipsis; font-size: 12px; color: #1c1c1e; }
td:last-child { border-right: none; }
td.dn { font-size: 10px; color: #8e8e93; }
td.dest-col { font-size: 11px; font-weight: 600; color: #1e3a5f; max-width: 150px; }

/* ---- STATI ---- */
.empty-state { text-align: center; padding: 40px 20px; color: #c7c7cc; }
.empty-icon { font-size: 40px; margin-bottom: 8px; display: block; }
.empty-title { font-weight: 600; color: #8e8e93; margin-bottom: 3px; font-size: 15px; }
.empty-sub { font-size: 12px; }
.loading-state { text-align: center; padding: 40px 20px; color: #8e8e93; font-size: 13px; }
.spinner { width: 28px; height: 28px; border: 3px solid #e5e5ea; border-top-color: #007aff; border-radius: 50%; animation: spin .7s linear infinite; margin: 0 auto 12px; }
@keyframes spin { to { transform: rotate(360deg); } }

::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #c1c8d8; border-radius: 2px; }

@media (min-width: 768px) {
    .topbar { flex-wrap: nowrap; }
    .filter-bar { flex-wrap: nowrap; padding: 0; }
}
@media (max-width: 600px) {
    .fg { min-width: calc(33% - 5px); }
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
    <div class="login-card">
        <span class="login-icon">📜</span>
        <div class="login-title">Storico Spedizioni</div>
        <div class="login-sub">ATS14 · Bollettazione</div>
        <button class="btn-google" onclick="signIn()">
            <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.47 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
            Accedi con Google
        </button>
        <p class="login-note">Accesso in sola lettura ai file xlsx su Drive.</p>
    </div>
</div>

<!-- APP -->
<div id="appShell">

    <header class="topbar">
        <div class="topbar-logo">Storico <span>Sped.</span></div>
        <div class="filter-bar">
            <div class="fg">
                <span class="fl">Data</span>
                <input type="text" class="filter-input" id="fDate" list="listDates" placeholder="GG/MM/AAAA" autocomplete="off">
                <datalist id="listDates"></datalist>
            </div>
            <div class="fg">
                <span class="fl">Plant</span>
                <select class="filter-select" id="fPlant"><option value="">Tutti</option></select>
            </div>
            <div class="fg">
                <span class="fl">Commessa</span>
                <select class="filter-select" id="fCommessa"><option value="">Tutte</option></select>
            </div>
            <div class="fg">
                <span class="fl">Spedizione</span>
                <select class="filter-select" id="fTipo"><option value="">Tutti</option></select>
            </div>
            <div class="fg">
                <span class="fl">Destino</span>
                <select class="filter-select" id="fDestino"><option value="">Tutti</option></select>
            </div>
            <button class="btn-cerca" id="btnCerca" onclick="loadData()" disabled>🔍 Carica</button>
            <button class="btn-reset" onclick="resetFiltri()" title="Azzera filtri">✕</button>
        </div>
        <div class="topbar-right">
            <div class="user-badge">
                <div id="userAvatarWrap"></div>
                <span id="userName">—</span>
            </div>
            <button class="btn-logout" onclick="signOut()">Esci</button>
        </div>
    </header>

    <!-- INFOBAR: summary + 2 tab (Carico + ODP) -->
    <div class="infobar" id="infobar">
        <div class="ib-stats">
            <div class="ib-stat">
                <div class="ib-val" id="sCar">0</div>
                <div class="ib-lbl">Righe Carico</div>
            </div>
            <div class="ib-stat">
                <div class="ib-val" id="sOdp">0</div>
                <div class="ib-lbl">ODP</div>
            </div>
        </div>
        <div class="ib-div"></div>
        <div class="ib-tabs">
            <button class="ib-tab active" data-tab="tc" onclick="switchTab('tc')">📦 Dettagli Carico <span class="badge" id="cnt-tc">0</span></button>
            <button class="ib-tab" data-tab="to" onclick="switchTab('to')">🔢 Dettagli ODP <span class="badge" id="cnt-to">0</span></button>
        </div>
    </div>

    <div class="scroll-area">
        <div id="content">
            <div class="empty-state">
                <span class="empty-icon">🔍</span>
                <div class="empty-title">Nessun dato caricato</div>
                <div class="empty-sub">Seleziona la data e premi Carica</div>
            </div>
        </div>
    </div>

</div>

<script src="https://accounts.google.com/gsi/client" async defer></script>
<script>
/* ================================================================
   CONFIG
================================================================ */
var CLIENT_ID   = '256693770433-b1pjdpaglrh7827o6ln2s24802rcnshd.apps.googleusercontent.com';
var FOLDER_ID   = '1dSm4qSDB2cZ5WhwDf_40TF-K7sjwStg4';
var SHEET_NAMES = ['Intestazione','Dettagli Carico','Dettagli ODP'];

var TOKEN = null, currentData = null, currentDate = null, activeTab = 'tc';

/* ================================================================
   COLONNE VISIBILI — definizioni default
   Per Dettagli Carico aggiungiamo Commessa, TipoSpedizione, AWB come
   colonne sintetiche (join da Intestazione), AWB nascosta di default
================================================================ */

// Colonne "extra" da Intestazione aggiunte a Dettagli Carico
// struttura: { key, label0, label1, visDefault }
var EXTRA_COLS = [
    { key: 'commessa',       label0: 'U_Commessa',       label1: 'Commessa',       visDefault: true  },
    { key: 'tipoSped',       label0: 'U_TipoSpedizione', label1: 'Tipo Sped.',     visDefault: true  },
    { key: 'awb',            label0: 'U_AWB',            label1: 'AWB',            visDefault: false }
];

// Colonne default visibili per sheet (header row2 normalizzato)
function nc(s) { return String(s||'').toLowerCase().replace(/[\s_\-]/g,''); }

var COL_DEF_VIS = {
    'dettaglicarico': ['destino','linenum','imballo','qty','quantity','altezzacm','larghezzacm','profonditacm','commessa','tiposped'],
    'dettagliodp':    ['destino','linenum','odp','numeroodp']
};

// colVis[sheetId] = array bool
var colVis = {};
var colToggleOpen = { tc: false, to: false };

function getColKey(sheetId) { return sheetId === 'tc' ? 'dettaglicarico' : 'dettagliodp'; }

function initColVis(sheetId, headers) {
    if (colVis[sheetId]) return;
    var key = getColKey(sheetId);
    var defs = COL_DEF_VIS[key] || [];
    var h1 = (headers && headers[1]) ? headers[1] : [];
    var arr = [];

    // Prima colonna = Destino extra (sempre presente, visibile per default)
    arr.push(defs.indexOf('destino') >= 0);

    if (sheetId === 'tc') {
        // Colonne extra da Intestazione (Commessa, TipoSped, AWB)
        EXTRA_COLS.forEach(function(ec) {
            arr.push(defs.indexOf(ec.key) >= 0 && ec.visDefault);
        });
    }

    // Colonne normali del file
    h1.forEach(function(h) { arr.push(defs.indexOf(nc(h)) >= 0); });

    colVis[sheetId] = arr;
}

function toggleColVis(sheetId, idx) {
    if (!colVis[sheetId]) return;
    colVis[sheetId][idx] = !colVis[sheetId][idx];
    reRenderPanel(sheetId);
}

function toggleColPanel(sheetId) {
    colToggleOpen[sheetId] = !colToggleOpen[sheetId];
    var wrap = document.getElementById('ct-wrap-' + sheetId);
    var btn  = document.getElementById('ct-btn-'  + sheetId);
    if (wrap) wrap.classList.toggle('show', colToggleOpen[sheetId]);
    if (btn)  btn.classList.toggle('open',  colToggleOpen[sheetId]);
}

/* ================================================================
   INIT — NON parte al load, solo se ?autostart=1
================================================================ */
window.onload = function () {
    var params = new URLSearchParams(window.location.search);
    if (params.get('autostart') === '1') {
        initApp();
    }
    // altrimenti la pagina rimane sulla schermata login e aspetta il click
};

function initApp() {
    var saved = getSaved();
    if (saved) {
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('appShell').style.display   = 'flex';
        setUserUI(saved.name, saved.picture);
        setContent(spinHtml('Connessione…'));
    }
    waitGsi();
}

var tokenClient;
function waitGsi() {
    if (typeof google === 'undefined') { setTimeout(waitGsi, 150); return; }
    tokenClient = google.accounts.oauth2.initTokenClient({
        client_id: CLIENT_ID,
        scope: 'https://www.googleapis.com/auth/drive.readonly https://www.googleapis.com/auth/userinfo.profile https://www.googleapis.com/auth/userinfo.email',
        callback: onToken
    });
    var saved = getSaved();
    if (saved) {
        tokenClient.requestAccessToken({ prompt: '', login_hint: saved.email || '' });
    } else {
        document.getElementById('loginScreen').style.display = 'flex';
        document.getElementById('appShell').style.display    = 'none';
    }
}

function signIn()  { tokenClient.requestAccessToken({ prompt: 'select_account' }); }
function signOut() {
    if (TOKEN) google.accounts.oauth2.revoke(TOKEN, function () {});
    TOKEN = null; currentData = null;
    localStorage.removeItem('vdc_storico_session');
    document.getElementById('infobar').classList.remove('show');
    document.getElementById('appShell').style.display    = 'none';
    document.getElementById('loginScreen').style.display = 'flex';
}
function onToken(resp) {
    if (resp.error) {
        document.getElementById('loginScreen').style.display = 'flex';
        document.getElementById('appShell').style.display    = 'none';
        return;
    }
    TOKEN = resp.access_token;
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('appShell').style.display    = 'flex';
    loadUserInfo();
    loadDates();
}

/* ================================================================
   SESSION
================================================================ */
function getSaved()        { try { var s = localStorage.getItem('vdc_storico_session'); return s ? JSON.parse(s) : null; } catch(e) { return null; } }
function setSaved(n, e, p) { try { localStorage.setItem('vdc_storico_session', JSON.stringify({ name: n, email: e, picture: p })); } catch(e) {} }

/* ================================================================
   USER UI
================================================================ */
function loadUserInfo() {
    gFetch('https://www.googleapis.com/oauth2/v2/userinfo').then(function (u) {
        if (u.error) return;
        setSaved(u.name || u.email || '', u.email || '', u.picture || '');
        setUserUI(u.name || u.email || '—', u.picture || '');
    }).catch(function () {});
}
function setUserUI(name, picture) {
    document.getElementById('userName').textContent = name || '—';
    var wrap = document.getElementById('userAvatarWrap'); wrap.innerHTML = '';
    if (picture) {
        var img = document.createElement('img'); img.className = 'user-avatar'; img.referrerPolicy = 'no-referrer'; img.src = picture;
        img.onerror = function () { wrap.innerHTML = makeInitial(name); };
        wrap.appendChild(img);
    } else { wrap.innerHTML = makeInitial(name); }
}
function makeInitial(str) { return '<div class="user-avatar-fallback">' + ((str||'?').trim().charAt(0).toUpperCase()) + '</div>'; }

/* ================================================================
   DATE
================================================================ */
function extractDate(name) { var m = name.match(/(\d{8})\.xlsx$/i); return m ? m[1] : null; }

function loadDates() {
    listFiles('"' + FOLDER_ID + '" in parents and mimeType="application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" and trashed=false')
    .then(function (files) {
        var set = {};
        files.forEach(function (f) { var d = extractDate(f.name); if (d) set[d] = true; });
        var dates = Object.keys(set).sort().reverse();
        var dl = document.getElementById('listDates');
        dates.forEach(function (d) {
            var txt = d.substr(6,2) + '/' + d.substr(4,2) + '/' + d.substr(0,4);
            var o = document.createElement('option'); o.value = txt; dl.appendChild(o);
        });
        if (!dates.length) return;
        var now = new Date();
        var todayStr = now.getFullYear().toString() + ('0'+(now.getMonth()+1)).slice(-2) + ('0'+now.getDate()).slice(-2);
        var pick = (dates.indexOf(todayStr) >= 0) ? todayStr : dates[0];
        document.getElementById('fDate').value = pick.substr(6,2) + '/' + pick.substr(4,2) + '/' + pick.substr(0,4);
        document.getElementById('btnCerca').disabled = false;
        loadData();
    }).catch(function () {});
}

function parseDate(str) {
    str = (str||'').trim();
    var m = str.match(/^(\d{2})\/(\d{2})\/(\d{4})$/);
    if (m) return m[3] + m[2] + m[1];
    if (/^\d{8}$/.test(str)) return str;
    return null;
}

document.getElementById('fDate').addEventListener('input', function () {
    document.getElementById('btnCerca').disabled = !parseDate(this.value);
});

/* ================================================================
   CARICA DATI
================================================================ */
function loadData() {
    var dateStr = parseDate(document.getElementById('fDate').value);
    if (!dateStr) return;
    currentDate = dateStr; currentData = null;
    colVis = {}; colToggleOpen = { tc: false, to: false };

    document.getElementById('infobar').classList.remove('show');
    setContent(spinHtml('Ricerca file per ' + fmtD(dateStr) + '…'));

    listFiles('"' + FOLDER_ID + '" in parents and mimeType="application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" and trashed=false')
    .then(function (files) {
        files = files.filter(function (f) { return extractDate(f.name) === dateStr; });
        if (!files.length) throw new Error('Nessun file trovato per il ' + fmtD(dateStr));
        setContent(spinHtml('Download ' + files.length + ' file…'));
        return Promise.all(files.map(function (f) { return downloadFile(f.id).then(function (b) { return { blob: b }; }); }));
    })
    .then(function (results) {
        setContent(spinHtml('Elaborazione…'));
        return Promise.all(results.map(function (r) { return parseXlsx(r.blob); }));
    })
    .then(function (parsed) {
        var merged = {}; SHEET_NAMES.forEach(function (sn) { merged[sn] = { headers: [], rows: [] }; });
        var hSet = false;
        parsed.forEach(function (p) {
            SHEET_NAMES.forEach(function (sn) {
                var sd = p[sn] || { headers: [], rows: [] };
                if (!hSet && sd.headers.length) merged[sn].headers = sd.headers;
                merged[sn].rows = merged[sn].rows.concat(sd.rows);
            });
            hSet = true;
        });
        SHEET_NAMES.forEach(function (sn) {
            merged[sn].rows.sort(function (a, b) { return String(a[0]||'').localeCompare(String(b[0]||''), undefined, { numeric: true }); });
        });
        currentData = merged;
        populateFilters(merged['Intestazione'].rows);
        render();
    })
    .catch(function (e) {
        setContent('<div class="empty-state"><span class="empty-icon">⚠️</span><div class="empty-title">Errore</div><div class="empty-sub">' + esc(e.message) + '</div></div>');
    });
}

/* ================================================================
   RENDER
================================================================ */
function render() {
    if (!currentData) return;

    var fPlant    = document.getElementById('fPlant').value.trim();
    var fCommessa = document.getElementById('fCommessa').value.trim();
    var fTipo     = document.getElementById('fTipo').value.trim();
    var fDestino  = document.getElementById('fDestino').value.trim();

    var ok = {};
    currentData['Intestazione'].rows.forEach(function (r) {
        if (fPlant    && String(r[5]||'').trim() !== fPlant)    return;
        if (fCommessa && String(r[7]||'').trim() !== fCommessa) return;
        if (fTipo     && String(r[6]||'').trim() !== fTipo)     return;
        if (fDestino  && String(r[8]||'').trim() !== fDestino)  return;
        ok[norm(r[0])] = true;
    });

    var fCar = currentData['Dettagli Carico'].rows.filter(function (r) { return ok[norm(r[0])]; });
    var fOdp = currentData['Dettagli ODP'].rows.filter(function (r) { return ok[norm(r[0])]; });

    document.getElementById('sCar').textContent = fCar.length;
    document.getElementById('sOdp').textContent = fOdp.length;
    document.getElementById('cnt-tc').textContent = fCar.length;
    document.getElementById('cnt-to').textContent = fOdp.length;
    document.getElementById('infobar').classList.add('show');

    // Mappe da Intestazione per il join
    var destiMap = {}, commessaMap = {}, tipoMap = {}, awbMap = {};
    currentData['Intestazione'].rows.forEach(function (r) {
        var dn = norm(r[0]);
        destiMap[dn]    = String(r[8]||'').trim();
        awbMap[dn]      = String(r[3]||'').trim();
        tipoMap[dn]     = String(r[6]||'').trim();
        commessaMap[dn] = String(r[7]||'').trim();
    });

    initColVis('tc', currentData['Dettagli Carico'].headers);
    initColVis('to', currentData['Dettagli ODP'].headers);

    var html = '';
    html += '<div id="panel-tc" class="tab-panel' + (activeTab==='tc'?' on':'') + '">'
          + buildPanel('tc', currentData['Dettagli Carico'].headers, fCar, destiMap, commessaMap, tipoMap, awbMap) + '</div>';
    html += '<div id="panel-to" class="tab-panel' + (activeTab==='to'?' on':'') + '">'
          + buildPanel('to', currentData['Dettagli ODP'].headers, fOdp, destiMap, null, null, null) + '</div>';

    setContent(html);
    document.querySelectorAll('.ib-tab').forEach(function (b) { b.classList.toggle('active', b.dataset.tab === activeTab); });
}

/* ================================================================
   BUILD PANEL
================================================================ */
function buildPanel(sheetId, headers, rows, destiMap, commessaMap, tipoMap, awbMap) {
    var isCarico = (sheetId === 'tc');
    var h1 = (headers && headers[1]) ? headers[1] : [];
    var h0 = (headers && headers[0]) ? headers[0] : [];
    var vis = colVis[sheetId] || [];
    var snEsc = sheetId;

    // ---- Colonne extra per Dettagli Carico ----
    // layout vis: [0]=Destino, [1]=Commessa, [2]=TipoSped, [3]=AWB, [4..]=colonne file
    // per ODP: [0]=Destino, [1..]=colonne file
    var extraOffset = isCarico ? 1 + EXTRA_COLS.length : 1; // quante colonne sintetiche prima delle colonne file

    // ---- Col toggle row (nascosta) ----
    var isOpen = colToggleOpen[sheetId] || false;
    var togWrapHtml = '<div class="col-toggle-wrap' + (isOpen ? ' show' : '') + '" id="ct-wrap-' + snEsc + '">';
    togWrapHtml += '<span class="ct-label">Mostra/Nascondi colonne</span>';

    // Destino
    togWrapHtml += '<button class="ct-btn' + (vis[0]!==false?' on':'') + '" onclick="toggleColVis(\'' + snEsc + '\',0)">📍 Destino</button>';

    if (isCarico) {
        EXTRA_COLS.forEach(function(ec, ei) {
            var vi = 1 + ei;
            togWrapHtml += '<button class="ct-btn' + (vis[vi]!==false?' on':'') + '" onclick="toggleColVis(\'' + snEsc + '\',' + vi + ')">' + esc(ec.label1) + '</button>';
        });
    }

    h1.forEach(function(hname, ci) {
        var vi = extraOffset + ci;
        togWrapHtml += '<button class="ct-btn' + (vis[vi]!==false?' on':'') + '" onclick="toggleColVis(\'' + snEsc + '\',' + vi + ')">' + esc(String(hname||'')) + '</button>';
    });
    togWrapHtml += '</div>';

    // ---- Toolbar ----
    var toolbar = '<div class="panel-toolbar">'
        + '<span class="results-info">' + rows.length + ' riga' + (rows.length!==1?'he':'') + '</span>'
        + '<button class="btn-toggle-cols' + (isOpen?' open':'') + '" id="ct-btn-' + snEsc + '" onclick="toggleColPanel(\'' + snEsc + '\')">'
        + '<span>⚙ Colonne</span><span class="arrow">▾</span>'
        + '</button>'
        + '</div>';

    if (!rows.length) {
        return toolbar + togWrapHtml + '<div class="empty-state"><span class="empty-icon">📭</span><div class="empty-title">Nessun dato</div><div class="empty-sub">Prova a modificare i filtri</div></div>';
    }

    var nc_cnt = Math.max(h1.length, rows[0] ? rows[0].length : 0);

    // ---- Table ----
    var tHtml = '<div class="tbl-card"><div class="tbl-wrap"><table><thead>';

    // Riga header tecnica (row0)
    tHtml += '<tr>';
    if (vis[0] !== false)                     tHtml += '<th>U_DEST</th>';
    if (isCarico) {
        EXTRA_COLS.forEach(function(ec, ei) {
            if (vis[1+ei] !== false) tHtml += '<th>' + esc(ec.label0) + '</th>';
        });
    }
    for (var c = 0; c < nc_cnt; c++) {
        if (vis[extraOffset + c] !== false) tHtml += '<th>' + esc(String(h0[c]||'')) + '</th>';
    }
    tHtml += '</tr>';

    // Riga header leggibile (row1)
    tHtml += '<tr>';
    if (vis[0] !== false)                     tHtml += '<th>Destino</th>';
    if (isCarico) {
        EXTRA_COLS.forEach(function(ec, ei) {
            if (vis[1+ei] !== false) tHtml += '<th>' + esc(ec.label1) + '</th>';
        });
    }
    for (var c = 0; c < nc_cnt; c++) {
        if (vis[extraOffset + c] !== false) tHtml += '<th>' + esc(String(h1[c]||'')) + '</th>';
    }
    tHtml += '</tr></thead><tbody>';

    rows.forEach(function (row) {
        var dn = norm(row[0]);
        tHtml += '<tr>';
        if (vis[0] !== false) tHtml += '<td class="dest-col">' + esc(destiMap[dn]||'') + '</td>';
        if (isCarico) {
            if (vis[1] !== false) tHtml += '<td>' + esc(commessaMap ? commessaMap[dn]||'' : '') + '</td>';
            if (vis[2] !== false) tHtml += '<td>' + esc(tipoMap    ? tipoMap[dn]||''    : '') + '</td>';
            if (vis[3] !== false) tHtml += '<td>' + esc(awbMap     ? awbMap[dn]||''     : '') + '</td>';
        }
        for (var c = 0; c < nc_cnt; c++) {
            if (vis[extraOffset + c] === false) continue;
            var v = row[c] !== undefined ? row[c] : '';
            tHtml += '<td' + (c===0?' class="dn"':'') + '>' + esc(String(v===null||v===undefined?'':v)) + '</td>';
        }
        tHtml += '</tr>';
    });
    tHtml += '</tbody></table></div></div>';

    return toolbar + togWrapHtml + tHtml;
}

/* re-render solo il pannello attivo senza perdere lo stato */
function reRenderPanel(sheetId) {
    var panel = document.getElementById('panel-' + sheetId);
    if (!panel || !currentData) return;

    var fPlant    = document.getElementById('fPlant').value.trim();
    var fCommessa = document.getElementById('fCommessa').value.trim();
    var fTipo     = document.getElementById('fTipo').value.trim();
    var fDestino  = document.getElementById('fDestino').value.trim();
    var ok = {};
    currentData['Intestazione'].rows.forEach(function (r) {
        if (fPlant    && String(r[5]||'').trim() !== fPlant)    return;
        if (fCommessa && String(r[7]||'').trim() !== fCommessa) return;
        if (fTipo     && String(r[6]||'').trim() !== fTipo)     return;
        if (fDestino  && String(r[8]||'').trim() !== fDestino)  return;
        ok[norm(r[0])] = true;
    });

    var destiMap = {}, commessaMap = {}, tipoMap = {}, awbMap = {};
    currentData['Intestazione'].rows.forEach(function (r) {
        var dn = norm(r[0]);
        destiMap[dn]    = String(r[8]||'').trim();
        awbMap[dn]      = String(r[3]||'').trim();
        tipoMap[dn]     = String(r[6]||'').trim();
        commessaMap[dn] = String(r[7]||'').trim();
    });

    var snKey = sheetId === 'tc' ? 'Dettagli Carico' : 'Dettagli ODP';
    var rows = currentData[snKey].rows.filter(function (r) { return ok[norm(r[0])]; });
    panel.innerHTML = buildPanel(sheetId, currentData[snKey].headers, rows, destiMap, commessaMap, tipoMap, awbMap);
}

/* ================================================================
   TABS
================================================================ */
function switchTab(id) {
    activeTab = id;
    document.querySelectorAll('.ib-tab').forEach(function (b) { b.classList.toggle('active', b.dataset.tab === id); });
    document.querySelectorAll('.tab-panel').forEach(function (p) { p.classList.remove('on'); });
    var p = document.getElementById('panel-' + id);
    if (p) p.classList.add('on');
}

/* ================================================================
   FILTRI
================================================================ */
function populateFilters(intRows) {
    var plants={}, commesse={}, tipi={}, destini={};
    intRows.forEach(function (r) {
        var p=String(r[5]||'').trim(), c=String(r[7]||'').trim(), t=String(r[6]||'').trim(), d=String(r[8]||'').trim();
        if(p) plants[p]=true; if(c) commesse[c]=true; if(t) tipi[t]=true; if(d) destini[d]=true;
    });
    fillSel('fPlant',    plants,   'Tutti');
    fillSel('fCommessa', commesse, 'Tutte');
    fillSel('fTipo',     tipi,     'Tutti');
    fillSel('fDestino',  destini,  'Tutti');
    ['fPlant','fCommessa','fTipo','fDestino'].forEach(function (id) {
        document.getElementById(id).onchange = function () { if (currentData) { colVis={}; colToggleOpen={tc:false,to:false}; render(); } };
    });
}

function fillSel(id, obj, ph) {
    var sel = document.getElementById(id), prev = sel.value;
    sel.innerHTML = '<option value="">' + ph + '</option>';
    Object.keys(obj).sort().forEach(function (v) {
        var o = document.createElement('option'); o.value = v; o.textContent = v;
        if (v === prev) o.selected = true;
        sel.appendChild(o);
    });
    if (prev && sel.value !== prev) sel.value = '';
}

function resetFiltri() {
    ['fPlant','fCommessa','fTipo','fDestino'].forEach(function (id) { document.getElementById(id).value = ''; });
    if (currentData) { colVis={}; colToggleOpen={tc:false,to:false}; render(); }
}

/* ================================================================
   PARSE XLSX
================================================================ */
function parseXlsx(blob) {
    return new Promise(function (resolve, reject) {
        var reader = new FileReader();
        reader.onload = function (e) {
            try {
                var wb = XLSX.read(new Uint8Array(e.target.result), { type: 'array', cellDates: true });
                var out = {};
                SHEET_NAMES.forEach(function (sn) {
                    var rn = wb.SheetNames.find(function (n) { return n.trim().toLowerCase() === sn.trim().toLowerCase(); });
                    if (!rn) { out[sn] = { headers: [], rows: [] }; return; }
                    var raw = XLSX.utils.sheet_to_json(wb.Sheets[rn], { header: 1, defval: '' });
                    var rows = [];
                    for (var i = 2; i < raw.length; i++) {
                        var row = raw[i];
                        if (!row.some(function (c) { return c !== ''; })) continue;
                        rows.push(row.map(function (c) { return c instanceof Date ? fmtDate(c) : c; }));
                    }
                    out[sn] = { headers: raw.slice(0, 2), rows: rows };
                });
                resolve(out);
            } catch (err) { reject(err); }
        };
        reader.onerror = reject;
        reader.readAsArrayBuffer(blob);
    });
}

/* ================================================================
   DRIVE API
================================================================ */
function listFiles(q) {
    return gFetch('https://www.googleapis.com/drive/v3/files?q=' + encodeURIComponent(q) + '&fields=files(id,name)&pageSize=200')
           .then(function (r) { return r.files || []; });
}
function downloadFile(id) {
    return fetch('https://www.googleapis.com/drive/v3/files/' + id + '?alt=media', { headers: { Authorization: 'Bearer ' + TOKEN } })
           .then(function (r) { if (!r.ok) throw new Error('Download fallito: ' + r.status); return r.blob(); });
}
function gFetch(url) {
    if (!TOKEN) return Promise.reject(new Error('No token'));
    return fetch(url, { headers: { Authorization: 'Bearer ' + TOKEN } }).then(function (r) { return r.json(); });
}

/* ================================================================
   UTILITY
================================================================ */
function setContent(h)  { document.getElementById('content').innerHTML = h; }
function spinHtml(msg)  { return '<div class="loading-state"><div class="spinner"></div>' + esc(msg) + '</div>'; }
function norm(v)        { if(v===null||v===undefined) return ''; var s=String(v).trim(); if(/^\d+\.0+$/.test(s)) s=s.replace(/\.0+$/,''); return s; }
function esc(s)         { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmtDate(d)     { return ('0'+d.getDate()).slice(-2)+'/'+('0'+(d.getMonth()+1)).slice(-2)+'/'+d.getFullYear(); }
function fmtD(s)        { return s.substr(6,2)+'/'+s.substr(4,2)+'/'+s.substr(0,4); }
