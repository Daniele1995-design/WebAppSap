<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Storico Spedizioni · ATS14</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📜</text></svg>">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body {
    height: 100%;
    background: #dfe4ee;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    font-size: 16px;
    color: #1c1c1e;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
}

/* ---- APP SHELL ---- */
#appShell { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

/* ================================================================
   TOPBAR
================================================================ */
.topbar {
    background: linear-gradient(135deg, #1e3a5f 0%, #2d5986 100%);
    padding: 0 12px;
    display: flex; align-items: center; gap: 8px;
    flex-shrink: 0;
    box-shadow: 0 2px 10px rgba(0,0,0,.25);
    z-index: 100;
    min-height: 48px;
    flex-wrap: wrap;
}
.topbar-logo { font-size: 16px; font-weight: 800; color: white; letter-spacing: .2px; flex-shrink: 0; white-space: nowrap; padding: 8px 0; }
.topbar-logo span { opacity: .6; font-weight: 500; }

.filter-bar { display: flex; align-items: center; gap: 5px; flex: 1; flex-wrap: wrap; padding: 5px 0; min-width: 0; }

.fg { display: flex; flex-direction: column; gap: 1px; background: rgba(255,255,255,.12); border-radius: 7px; padding: 4px 8px; transition: background .15s; flex: 1; min-width: 80px; }
.fg:hover { background: rgba(255,255,255,.2); }
.fl { font-size: 10px; font-weight: 700; color: rgba(255,255,255,.5); text-transform: uppercase; letter-spacing: .6px; white-space: nowrap; }
.filter-input { border: none; outline: none; font-size: 13px; font-weight: 600; color: white; background: transparent; width: 100%; font-family: inherit; padding: 0; cursor: text; }
.filter-input::placeholder { color: rgba(255,255,255,.35); }

/* Select wrapper: click ovunque apre il menu */
.fg-sel {
    position: relative;
    display: flex; flex-direction: column; gap: 1px;
    background: rgba(255,255,255,.12);
    border-radius: 7px; padding: 4px 8px;
    transition: background .15s; flex: 1; min-width: 80px;
}
.fg-sel:hover { background: rgba(255,255,255,.2); }
.fg-sel .fl { pointer-events: none; }
.fg-sel select { position: absolute; inset: 0; opacity: 0; width: 100%; height: 100%; cursor: pointer; border: none; outline: none; z-index: 2; font-size: 16px; }
.fg-sel .sel-val { font-size: 13px; font-weight: 600; color: white; pointer-events: none; display: flex; align-items: center; justify-content: space-between; gap: 4px; }
.fg-sel .sel-val svg { flex-shrink: 0; opacity: .85; }
option { background: #1e3a5f; color: white; }

.btn-cerca { background: rgba(255,255,255,.2); color: white; border: 1.5px solid rgba(255,255,255,.35); border-radius: 7px; padding: 6px 12px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit; white-space: nowrap; flex-shrink: 0; transition: background .15s; }
.btn-cerca:hover { background: rgba(255,255,255,.3); }
.btn-cerca:disabled { opacity: .35; cursor: not-allowed; }
.btn-reset { background: none; color: rgba(255,255,255,.5); border: 1px solid rgba(255,255,255,.2); border-radius: 7px; padding: 6px 9px; font-size: 13px; cursor: pointer; font-family: inherit; flex-shrink: 0; transition: all .15s; }
.btn-reset:hover { color: white; border-color: rgba(255,255,255,.4); }

/* Topbar-right: solo pulsante logout/accedi, niente badge utente */
.topbar-right { display: flex; align-items: center; gap: 6px; flex-shrink: 0; padding: 5px 0; }
.btn-logout { background: rgba(255,255,255,.12); border: none; border-radius: 6px; padding: 5px 9px; font-size: 12px; color: rgba(255,255,255,.7); cursor: pointer; font-family: inherit; transition: background .2s; }
.btn-logout:hover { background: rgba(255,255,255,.22); color: white; }

/* ================================================================
   INFOBAR — una sola riga: stats | tab | spacer | col-toggle
================================================================ */
.infobar {
    display: none;
    background: white;
    border-bottom: 1px solid #d1d8e8;
    padding: 0 10px;
    align-items: center;
    gap: 0;
    flex-shrink: 0;
    height: 42px;
    box-shadow: 0 1px 4px rgba(0,0,0,.06);
    position: relative;
}
.infobar.show { display: flex; }

.ib-stats { display: flex; gap: 0; flex-shrink: 0; }
.ib-stat { display: flex; flex-direction: column; align-items: center; padding: 0 12px 0 0; margin-right: 12px; border-right: 1px solid #e5e5ea; }
.ib-stat:last-of-type { border-right: none; margin-right: 0; padding-right: 0; }
.ib-val { font-size: 17px; font-weight: 800; color: #1e3a5f; line-height: 1; }
.ib-lbl { font-size: 9px; font-weight: 600; color: #8e8e93; text-transform: uppercase; letter-spacing: .4px; margin-top: 1px; }
.ib-div { width: 1px; background: #e5e5ea; align-self: stretch; margin: 5px 8px; flex-shrink: 0; }

.ib-tabs { display: flex; gap: 0; }
.ib-tab { padding: 0 12px; border: none; background: none; font-size: 13px; font-weight: 600; color: #8e8e93; cursor: pointer; border-bottom: 2.5px solid transparent; transition: all .2s; display: flex; align-items: center; gap: 4px; font-family: inherit; white-space: nowrap; height: 42px; }
.ib-tab.active { color: #007aff; border-bottom-color: #007aff; }
.badge { background: #e5e5ea; color: #8e8e93; border-radius: 8px; padding: 1px 6px; font-size: 11px; font-weight: 700; min-width: 18px; text-align: center; }
.ib-tab.active .badge { background: #e8f4ff; color: #007aff; }

.ib-spacer { flex: 1; }

/* ---- COL TOGGLE — inline nell'infobar, dropdown verso il basso ---- */
.ct-wrap { position: relative; flex-shrink: 0; }
.ct-toggle-btn {
    display: inline-flex; align-items: center; gap: 5px;
    background: #f4f6fa; border: 1px solid #d1d8e8; border-radius: 7px;
    padding: 5px 11px; font-size: 12px; font-weight: 700; color: #8e8e93;
    cursor: pointer; font-family: inherit; transition: all .15s; white-space: nowrap; height: 30px;
}
.ct-toggle-btn:hover, .ct-toggle-btn.open { border-color: #007aff; color: #007aff; background: #eef5ff; }
.ct-arrow { font-size: 9px; transition: transform .2s; line-height: 1; }
.ct-toggle-btn.open .ct-arrow { transform: rotate(180deg); }

.ct-panel {
    display: none; position: absolute; top: calc(100% + 4px); right: 0;
    background: white; border: 1px solid #d1d8e8; border-radius: 10px;
    padding: 10px 12px; box-shadow: 0 6px 20px rgba(0,0,0,.13);
    z-index: 500; min-width: 300px; max-width: 92vw;
    animation: ctFade .15s ease;
}
.ct-panel.open { display: block; }
@keyframes ctFade { from { opacity:0; transform:translateY(-4px); } to { opacity:1; transform:translateY(0); } }

.ct-row { display: flex; gap: 5px; flex-wrap: wrap; align-items: center; }
.ct-label { font-size: 11px; font-weight: 700; color: #8e8e93; text-transform: uppercase; letter-spacing: .4px; flex-shrink: 0; margin-right: 3px; white-space: nowrap; }
.ct-btn { border: 1px solid #d1d8e8; background: white; border-radius: 20px; padding: 4px 10px; font-size: 12px; font-weight: 600; color: #8e8e93; cursor: pointer; font-family: inherit; transition: all .15s; white-space: nowrap; }
.ct-btn:hover { border-color: #007aff; color: #007aff; }
.ct-btn.on { background: #007aff; border-color: #007aff; color: white; }

/* ================================================================
   SCROLL AREA
================================================================ */
.scroll-area { flex: 1; overflow-y: auto; padding: 8px 10px 16px; -webkit-overflow-scrolling: touch; min-height: 0; }
.results-info { font-size: 12px; color: #8e8e93; text-align: right; padding: 2px 2px 5px; }

/* ---- TABLE ---- */
.tab-panel { display: none; }
.tab-panel.on { display: block; }
.tbl-card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,.07); }
.tbl-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 14px; }
thead tr:first-child th { font-size: 10px; font-weight: 700; letter-spacing: .6px; text-transform: uppercase; color: #8e8e93; padding: 7px 10px 2px; border-right: .5px solid #e5e5ea; background: #f4f6fa; white-space: nowrap; }
thead tr:last-child th { font-size: 13px; font-weight: 600; color: #3c3c43; padding: 2px 10px 7px; border-right: .5px solid #e5e5ea; background: #f4f6fa; white-space: nowrap; border-bottom: 1px solid #d8dde8; }
thead th:last-child { border-right: none !important; }
tbody tr { border-bottom: .5px solid #e8ecf2; transition: background .1s; }
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: rgba(0,122,255,.04); }
td { padding: 8px 10px; border-right: .5px solid #ebeef4; white-space: nowrap; max-width: 200px; overflow: hidden; text-overflow: ellipsis; font-size: 14px; color: #1c1c1e; }
td:last-child { border-right: none; }
td.col-docnum { font-size: 11px; color: #8e8e93; font-family: monospace; }
td.col-awb    { font-size: 12px; color: #555; }
td.col-extra  { font-size: 13px; font-weight: 500; color: #3a3a8c; }
td.col-dest   { font-size: 13px; font-weight: 600; color: #1e3a5f; max-width: 160px; }
th.col-extra  { background: #f0f4ff !important; color: #3a3a8c !important; }

/* ---- STATI ---- */
.empty-state { text-align: center; padding: 36px 20px; color: #c7c7cc; }
.empty-icon { font-size: 38px; margin-bottom: 8px; display: block; }
.empty-title { font-weight: 600; color: #8e8e93; margin-bottom: 3px; font-size: 16px; }
.empty-sub { font-size: 13px; }
.loading-state { text-align: center; padding: 40px 20px; color: #8e8e93; font-size: 14px; }
.spinner { width: 28px; height: 28px; border: 3px solid #e5e5ea; border-top-color: #007aff; border-radius: 50%; animation: spin .7s linear infinite; margin: 0 auto 12px; }
@keyframes spin { to { transform: rotate(360deg); } }

::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #c1c8d8; border-radius: 2px; }

@media (min-width: 768px) { .topbar { flex-wrap: nowrap; } .filter-bar { flex-wrap: nowrap; padding: 0; } .fg, .fg-sel { min-width: 0; } }
@media (max-width: 600px) { .fg, .fg-sel { min-width: calc(33% - 4px); } .ib-val { font-size: 15px; } .ct-panel { right: -8px; min-width: 260px; } }
</style>
</head>
<body>

<div id="appShell">

    <header class="topbar">
        <div class="topbar-logo">Storico <span>Sped.</span></div>
        <div class="filter-bar">
            <div class="fg">
                <span class="fl">Data</span>
                <input type="text" class="filter-input" id="fDate" list="listDates" placeholder="GG/MM/AAAA" autocomplete="off">
                <datalist id="listDates"></datalist>
            </div>
            <div class="fg-sel">
                <span class="fl">Plant</span>
                <div class="sel-val"><span id="sv-plant-txt">Tutti</span>
                    <svg width="10" height="6" viewBox="0 0 10 6" fill="none"><path d="M1 1l4 4 4-4" stroke="white" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </div>
                <select id="fPlant" onchange="syncSelVal('plant'); if(currentData){colVis={};render();}"><option value="">Tutti</option></select>
            </div>
            <div class="fg-sel">
                <span class="fl">Commessa</span>
                <div class="sel-val"><span id="sv-commessa-txt">Tutte</span>
                    <svg width="10" height="6" viewBox="0 0 10 6" fill="none"><path d="M1 1l4 4 4-4" stroke="white" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </div>
                <select id="fCommessa" onchange="syncSelVal('commessa'); if(currentData){colVis={};render();}"><option value="">Tutte</option></select>
            </div>
            <div class="fg-sel">
                <span class="fl">Spedizione</span>
                <div class="sel-val"><span id="sv-tipo-txt">Tutti</span>
                    <svg width="10" height="6" viewBox="0 0 10 6" fill="none"><path d="M1 1l4 4 4-4" stroke="white" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </div>
                <select id="fTipo" onchange="syncSelVal('tipo'); if(currentData){colVis={};render();}"><option value="">Tutti</option></select>
            </div>
            <div class="fg-sel">
                <span class="fl">Destino</span>
                <div class="sel-val"><span id="sv-destino-txt">Tutti</span>
                    <svg width="10" height="6" viewBox="0 0 10 6" fill="none"><path d="M1 1l4 4 4-4" stroke="white" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </div>
                <select id="fDestino" onchange="syncSelVal('destino'); if(currentData){colVis={};render();}"><option value="">Tutti</option></select>
            </div>
            <button class="btn-cerca" id="btnCerca" onclick="loadData()" disabled>🔍 Carica</button>
            <button class="btn-reset" onclick="resetFiltri()" title="Azzera filtri">✕</button>
        </div>
        <!-- Topbar-right: solo Esci, niente badge utente -->
        <div class="topbar-right">
            <button class="btn-logout" id="btn-logout-top" onclick="signOut()" style="display:none;">Esci</button>
        </div>
    </header>

    <!-- INFOBAR: stats | tab Carico | tab ODP | spacer | ☰ Colonne -->
    <div class="infobar" id="infobar">
        <div class="ib-stats">
            <div class="ib-stat"><div class="ib-val" id="sDoc">0</div><div class="ib-lbl">Sped.</div></div>
            <div class="ib-stat"><div class="ib-val" id="sCar">0</div><div class="ib-lbl">Carico</div></div>
            <div class="ib-stat"><div class="ib-val" id="sOdp">0</div><div class="ib-lbl">ODP</div></div>
        </div>
        <div class="ib-div"></div>
        <div class="ib-tabs">
            <button class="ib-tab active" data-tab="tc" onclick="switchTab('tc')">📦 Carico <span class="badge" id="cnt-tc">0</span></button>
            <button class="ib-tab"        data-tab="to" onclick="switchTab('to')">🔢 ODP <span class="badge" id="cnt-to">0</span></button>
        </div>
        <div class="ib-spacer"></div>
        <div class="ct-wrap" id="ct-wrap-global">
            <button class="ct-toggle-btn" id="ct-btn-global" onclick="toggleCtPanel()">☰ Colonne <span class="ct-arrow">▾</span></button>
            <div class="ct-panel" id="ct-panel-global">
                <div class="ct-row"><span class="ct-label">Carica i dati prima</span></div>
            </div>
        </div>
    </div>

    <div class="scroll-area">
        <div id="content">
            <div class="empty-state">
                <span class="empty-icon">🔍</span>
                <div class="empty-title">Nessun dato caricato</div>
                <div class="empty-sub">Seleziona la data e premi Carica</div>
            </div>
        </div>
    </div>
</div>

<script src="https://accounts.google.com/gsi/client" async defer></script>
<script>
/* ================================================================
   CONFIG
================================================================ */
var CLIENT_ID   = '256693770433-b1pjdpaglrh7827o6ln2s24802rcnshd.apps.googleusercontent.com';
var FOLDER_ID   = '1dSm4qSDB2cZ5WhwDf_40TF-K7sjwStg4';
var SHEET_NAMES = ['Intestazione','Dettagli Carico','Dettagli ODP'];
var TOKEN = null, currentData = null, currentDate = null, activeTab = 'tc';
var colVis = {};

/* ================================================================
   STRUTTURA COLONNE
   Ogni sheet ha uno schema fisso di slot:
   CARICO:  0=DocNum  1=Destino  2=Commessa  3=TipoSped  4=AWB  5..N=colonne file (skip DocNum=0)
   ODP:     0=DocNum  1=Destino  2=Commessa  3=TipoSped  4=AWB  5..N=colonne file (skip DocNum=0)

   Visibilità default:
   - DocNum : false (nascosto)
   - Destino: true
   - Commessa: true
   - TipoSped: true
   - AWB: false (nascosto, disponibile nel toggle)
   - colonne file: secondo COL_DEF
================================================================ */
var SLOT = { DOCNUM:0, DESTINO:1, COMMESSA:2, TIPOSED:3, AWB:4, FILE_START:5 };

var COL_DEF_VIS = {
    'dettaglicarico': ['linenum','imballo','qty','quantity','altezzacm','larghezzacm','profonditacm','pesototalerrigakg'],
    'dettagliodp':    ['linenum','odp','numeroodp']
};

function nc(s){ return String(s||'').toLowerCase().replace(/[_\s\-]/g,''); }

function initColVis(sheetName, headers){
    if(colVis[sheetName]) return;
    var key = nc(sheetName);
    var defs = COL_DEF_VIS[key]||[];
    var h1 = (headers&&headers[1])?headers[1]:[];
    // slot fissi
    var arr = [
        false, // 0 DocNum — nascosto
        true,  // 1 Destino
        true,  // 2 Commessa
        true,  // 3 TipoSped
        false  // 4 AWB — nascosto di default
    ];
    // slot colonne file (h1[0] = DocNum → sempre skip)
    h1.forEach(function(h, ci){
        if(ci===0){ arr.push(false); return; } // DocNum del file, nascosto
        arr.push(defs.indexOf(nc(h))>=0);
    });
    colVis[sheetName] = arr;
}

function toggleCol(sheetName, colIdx){
    if(!colVis[sheetName]) return;
    colVis[sheetName][colIdx] = !colVis[sheetName][colIdx];
    reRenderActive();
    refreshColPanel();
}

/* ================================================================
   COL TOGGLE PANEL
================================================================ */
function toggleCtPanel(){
    var btn   = document.getElementById('ct-btn-global');
    var panel = document.getElementById('ct-panel-global');
    var open  = panel.classList.contains('open');
    panel.classList.toggle('open',!open);
    btn.classList.toggle('open',!open);
}
document.addEventListener('click', function(e){
    var wrap = document.getElementById('ct-wrap-global');
    if(wrap && !wrap.contains(e.target)){
        document.getElementById('ct-panel-global').classList.remove('open');
        document.getElementById('ct-btn-global').classList.remove('open');
    }
});

function refreshColPanel(){
    var map = { tc:'Dettagli Carico', to:'Dettagli ODP' };
    var sn  = map[activeTab];
    if(!sn||!currentData) return;
    var headers = currentData[sn].headers;
    var h1  = (headers&&headers[1])?headers[1]:[];
    var vis = colVis[sn]||[];
    var snE = sn.replace(/'/g,"\\'");

    var html = '<div class="ct-row"><span class="ct-label">Visibili</span>';
    // Slot fissi
    html += ctBtn(SLOT.DOCNUM,  vis, '🔑 DocNum',    snE, '');
    html += ctBtn(SLOT.DESTINO, vis, '📍 Destino',   snE, '');
    html += ctBtn(SLOT.COMMESSA,vis, '🏷 Commessa',  snE, '');
    html += ctBtn(SLOT.TIPOSED, vis, '🚚 TipoSped',  snE, '');
    html += ctBtn(SLOT.AWB,     vis, '✈️ AWB',        snE, '');
    // Colonne file (skip DocNum = ci=0)
    h1.forEach(function(hname, ci){
        if(ci===0) return;
        html += ctBtn(SLOT.FILE_START+ci, vis, esc(String(hname||'')), snE, '');
    });
    html += '</div>';
    document.getElementById('ct-panel-global').innerHTML = html;
}

function ctBtn(idx, vis, label, snE, extra){
    var on = vis[idx]!==false;
    return '<button class="ct-btn '+(extra?extra+' ':'')+(on?'on':'')+'" onclick="toggleCol(\''+snE+'\','+idx+')">'+label+'</button>';
}

/* ================================================================
   SYNC SELECT VALUE
================================================================ */
function syncSelVal(key){
    var map = {plant:'fPlant',commessa:'fCommessa',tipo:'fTipo',destino:'fDestino'};
    var ph  = {plant:'Tutti',commessa:'Tutte',tipo:'Tutti',destino:'Tutti'};
    var sel = document.getElementById(map[key]);
    var sp  = document.getElementById('sv-'+key+'-txt');
    if(sel&&sp) sp.textContent = sel.value||ph[key];
}

/* ================================================================
   INIT — app visibile subito, login su richiesta
================================================================ */
window.onload = function(){
    var saved = getSaved();
    if(saved && saved.email){
        // Mostra Esci, nasconde Accedi
        showLogoutBtn();
    } else {
        addLoginBtn();
    }
    waitGsi();
};

var tokenClient, gsiReady=false;

function waitGsi(){
    if(typeof google==='undefined'){ setTimeout(waitGsi,150); return; }
    tokenClient = google.accounts.oauth2.initTokenClient({
        client_id: CLIENT_ID,
        scope: 'https://www.googleapis.com/auth/drive.readonly https://www.googleapis.com/auth/userinfo.email',
        callback: onToken
    });
    gsiReady = true;
    // Rinnovo silenzioso solo se sessione già presente
    var saved = getSaved();
    if(saved && saved.email){
        tokenClient.requestAccessToken({prompt:'', login_hint:saved.email});
    }
}

function addLoginBtn(){
    if(document.getElementById('btn-topbar-login')) return;
    var tb = document.querySelector('.topbar-right');
    if(!tb) return;
    var b = document.createElement('button');
    b.id='btn-topbar-login'; b.className='btn-cerca';
    b.style.cssText='background:rgba(255,255,255,.25);';
    b.innerHTML='🔑 Accedi'; b.onclick=signIn;
    tb.insertBefore(b, tb.firstChild);
}
function showLogoutBtn(){
    var lb = document.getElementById('btn-topbar-login');
    if(lb) lb.remove();
    var el = document.getElementById('btn-logout-top');
    if(el) el.style.display='';
}

function signIn(){
    if(!gsiReady){ setTimeout(signIn,200); return; }
    tokenClient.requestAccessToken({prompt:'select_account'});
}
function signOut(){
    if(TOKEN) google.accounts.oauth2.revoke(TOKEN,function(){});
    TOKEN=null; currentData=null;
    localStorage.removeItem('vdc_storico_session');
    document.getElementById('infobar').classList.remove('show');
    setContent('<div class="empty-state"><span class="empty-icon">🔐</span><div class="empty-title">Sessione terminata</div><div class="empty-sub">Premi "Accedi" per ricaricare</div></div>');
    document.getElementById('btnCerca').disabled=true;
    document.getElementById('btn-logout-top').style.display='none';
    addLoginBtn();
}
function onToken(resp){
    if(resp.error) return;
    TOKEN=resp.access_token;
    showLogoutBtn();
    // Salva solo email (no nome, no avatar)
    gFetch('https://www.googleapis.com/oauth2/v2/userinfo').then(function(u){
        if(u&&u.email) setSaved('',u.email,'');
    }).catch(function(){});
    loadDates();
}

/* SESSION */
function getSaved(){ try{ var s=localStorage.getItem('vdc_storico_session'); return s?JSON.parse(s):null; }catch(e){return null;} }
function setSaved(n,e,p){ try{localStorage.setItem('vdc_storico_session',JSON.stringify({name:n,email:e,picture:p}));}catch(e){} }

/* ================================================================
   DATE
================================================================ */
function extractDate(name){ var m=name.match(/(\d{8})\.xlsx$/i); return m?m[1]:null; }

function loadDates(){
    listFiles('"'+FOLDER_ID+'" in parents and mimeType="application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" and trashed=false')
    .then(function(files){
        var set={};
        files.forEach(function(f){ var d=extractDate(f.name); if(d) set[d]=true; });
        var dates=Object.keys(set).sort().reverse();
        var dl=document.getElementById('listDates');
        dates.forEach(function(d){
            var o=document.createElement('option');
            o.value=d.substr(6,2)+'/'+d.substr(4,2)+'/'+d.substr(0,4);
            dl.appendChild(o);
        });
        if(!dates.length) return;
        var now=new Date();
        var today=now.getFullYear().toString()+('0'+(now.getMonth()+1)).slice(-2)+('0'+now.getDate()).slice(-2);
        var pick=(dates.indexOf(today)>=0)?today:dates[0];
        document.getElementById('fDate').value=pick.substr(6,2)+'/'+pick.substr(4,2)+'/'+pick.substr(0,4);
        document.getElementById('btnCerca').disabled=false;
        loadData();
    }).catch(function(){});
}

function parseDate(str){
    str=(str||'').trim();
    var m=str.match(/^(\d{2})\/(\d{2})\/(\d{4})$/);
    if(m) return m[3]+m[2]+m[1];
    if(/^\d{8}$/.test(str)) return str;
    return null;
}
document.getElementById('fDate').addEventListener('input',function(){
    if(!TOKEN){ signIn(); return; }
    document.getElementById('btnCerca').disabled=!parseDate(this.value);
});

/* ================================================================
   LOAD DATA
================================================================ */
function loadData(){
    if(!TOKEN){ signIn(); return; }
    var dateStr=parseDate(document.getElementById('fDate').value);
    if(!dateStr) return;
    currentDate=dateStr; currentData=null; colVis={}; activeTab='tc';
    document.getElementById('infobar').classList.remove('show');
    setContent(spinHtml('Ricerca file per '+fmtD(dateStr)+'…'));

    listFiles('"'+FOLDER_ID+'" in parents and mimeType="application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" and trashed=false')
    .then(function(files){
        files=files.filter(function(f){ return extractDate(f.name)===dateStr; });
        if(!files.length) throw new Error('Nessun file trovato per il '+fmtD(dateStr));
        setContent(spinHtml('Download '+files.length+' file…'));
        return Promise.all(files.map(function(f){ return downloadFile(f.id).then(function(b){ return {blob:b}; }); }));
    })
    .then(function(results){
        setContent(spinHtml('Elaborazione…'));
        return Promise.all(results.map(function(r){ return parseXlsx(r.blob); }));
    })
    .then(function(parsed){
        var merged={}; SHEET_NAMES.forEach(function(sn){ merged[sn]={headers:[],rows:[]}; });
        var hSet=false;
        parsed.forEach(function(p){
            SHEET_NAMES.forEach(function(sn){
                var sd=p[sn]||{headers:[],rows:[]};
                if(!hSet&&sd.headers.length) merged[sn].headers=sd.headers;
                merged[sn].rows=merged[sn].rows.concat(sd.rows);
            });
            hSet=true;
        });
        SHEET_NAMES.forEach(function(sn){
            merged[sn].rows.sort(function(a,b){ return String(a[0]||'').localeCompare(String(b[0]||''),undefined,{numeric:true}); });
        });
        currentData=merged;
        populateFilters(merged['Intestazione'].rows);
        render();
    })
    .catch(function(e){
        setContent('<div class="empty-state"><span class="empty-icon">⚠️</span><div class="empty-title">Errore</div><div class="empty-sub">'+esc(e.message)+'</div></div>');
    });
}

/* ================================================================
   RENDER
================================================================ */
function getFilteredOk(){
    var fP=document.getElementById('fPlant').value.trim();
    var fC=document.getElementById('fCommessa').value.trim();
    var fT=document.getElementById('fTipo').value.trim();
    var fD=document.getElementById('fDestino').value.trim();
    var ok={};
    currentData['Intestazione'].rows.forEach(function(r){
        if(fP&&String(r[5]||'').trim()!==fP) return;
        if(fC&&String(r[7]||'').trim()!==fC) return;
        if(fT&&String(r[6]||'').trim()!==fT) return;
        if(fD&&String(r[8]||'').trim()!==fD) return;
        ok[norm(r[0])]=true;
    });
    return ok;
}

function buildMetaMap(){
    var m={};
    currentData['Intestazione'].rows.forEach(function(r){
        m[norm(r[0])]={
            destino: String(r[8]||'').trim(),
            commessa:String(r[7]||'').trim(),
            tipoSped:String(r[6]||'').trim(),
            awb:     String(r[3]||'').trim(),
            docnum:  String(r[0]||'').trim()
        };
    });
    return m;
}

function render(){
    if(!currentData) return;
    var ok=getFilteredOk();
    var fInt=currentData['Intestazione'].rows.filter(function(r){ return ok[norm(r[0])]; });
    var fCar=currentData['Dettagli Carico'].rows.filter(function(r){ return ok[norm(r[0])]; });
    var fOdp=currentData['Dettagli ODP'].rows.filter(function(r){ return ok[norm(r[0])]; });

    document.getElementById('sDoc').textContent=fInt.length;
    document.getElementById('sCar').textContent=fCar.length;
    document.getElementById('sOdp').textContent=fOdp.length;
    document.getElementById('cnt-tc').textContent=fCar.length;
    document.getElementById('cnt-to').textContent=fOdp.length;
    document.getElementById('infobar').classList.add('show');

    var metaMap=buildMetaMap();
    initColVis('Dettagli Carico',currentData['Dettagli Carico'].headers);
    initColVis('Dettagli ODP',   currentData['Dettagli ODP'].headers);

    var html='';
    html+='<div id="panel-tc" class="tab-panel'+(activeTab==='tc'?' on':'')+'">'
         +buildPanel('Dettagli Carico',currentData['Dettagli Carico'].headers,fCar,metaMap,fCar.length)+'</div>';
    html+='<div id="panel-to" class="tab-panel'+(activeTab==='to'?' on':'')+'">'
         +buildPanel('Dettagli ODP',currentData['Dettagli ODP'].headers,fOdp,metaMap,fOdp.length)+'</div>';
    setContent(html);

    document.querySelectorAll('.ib-tab').forEach(function(b){ b.classList.toggle('active',b.dataset.tab===activeTab); });
    refreshColPanel();
}

function reRenderActive(){
    if(!currentData) return;
    var map={tc:'Dettagli Carico',to:'Dettagli ODP'};
    var sn=map[activeTab]; if(!sn) return;
    var panel=document.getElementById('panel-'+activeTab); if(!panel) return;
    var ok=getFilteredOk();
    var rows=currentData[sn].rows.filter(function(r){ return ok[norm(r[0])]; });
    var metaMap=buildMetaMap();
    panel.innerHTML=buildPanel(sn,currentData[sn].headers,rows,metaMap,rows.length);
}

/* ================================================================
   BUILD PANEL
   Ogni riga ha slot fissi PRIMA delle colonne file:
   col 0 = DocNum (da metaMap, stesso del file)
   col 1 = Destino (da metaMap)
   col 2 = Commessa (da metaMap)
   col 3 = TipoSped (da metaMap)
   col 4 = AWB (da metaMap)
   col 5..N = colonne del file (h1[1..] — skip h1[0]=DocNum)
================================================================ */
function buildPanel(sheetName, headers, rows, metaMap, total){
    var h1=(headers&&headers[1])?headers[1]:[];
    var h0=(headers&&headers[0])?headers[0]:[];
    var vis=colVis[sheetName]||[];
    var nc_file=Math.max(h1.length, rows[0]?rows[0].length:0);

    if(!rows.length){
        return '<div class="empty-state"><span class="empty-icon">📭</span>'
              +'<div class="empty-title">Nessun dato</div>'
              +'<div class="empty-sub">Prova a modificare i filtri</div></div>';
    }

    var info='<div class="results-info">'+total+' riga'+(total!==1?'he':'')+'</div>';

    /* ---- header riga 1 (codice SAP) ---- */
    var t='<div class="tbl-card"><div class="tbl-wrap"><table><thead><tr>';
    if(vis[SLOT.DOCNUM]!==false)  t+='<th>DOCNUM</th>';
    if(vis[SLOT.DESTINO]!==false) t+='<th class="col-extra">DESTINO</th>';
    if(vis[SLOT.COMMESSA]!==false)t+='<th class="col-extra">COMMESSA</th>';
    if(vis[SLOT.TIPOSED]!==false) t+='<th class="col-extra">TIPO_SPED</th>';
    if(vis[SLOT.AWB]!==false)     t+='<th class="col-extra">AWB</th>';
    for(var c=1;c<nc_file;c++){
        if(vis[SLOT.FILE_START+c]===false) continue;
        t+='<th>'+esc(String(h0[c]||''))+'</th>';
    }
    t+='</tr>';
    /* ---- header riga 2 (leggibile) ---- */
    t+='<tr>';
    if(vis[SLOT.DOCNUM]!==false)  t+='<th>DocNum</th>';
    if(vis[SLOT.DESTINO]!==false) t+='<th class="col-extra">Destino</th>';
    if(vis[SLOT.COMMESSA]!==false)t+='<th class="col-extra">Commessa</th>';
    if(vis[SLOT.TIPOSED]!==false) t+='<th class="col-extra">Tipo Sped.</th>';
    if(vis[SLOT.AWB]!==false)     t+='<th class="col-extra">AWB</th>';
    for(var c=1;c<nc_file;c++){
        if(vis[SLOT.FILE_START+c]===false) continue;
        t+='<th>'+esc(String(h1[c]||''))+'</th>';
    }
    t+='</tr></thead><tbody>';

    /* ---- righe dati ---- */
    rows.forEach(function(row){
        var dn  =norm(row[0]);
        var meta=metaMap[dn]||{destino:'',commessa:'',tipoSped:'',awb:'',docnum:dn};
        t+='<tr>';
        if(vis[SLOT.DOCNUM]!==false)  t+='<td class="col-docnum">'+esc(meta.docnum)+'</td>';
        if(vis[SLOT.DESTINO]!==false) t+='<td class="col-dest">'+esc(meta.destino)+'</td>';
        if(vis[SLOT.COMMESSA]!==false)t+='<td class="col-extra">'+esc(meta.commessa)+'</td>';
        if(vis[SLOT.TIPOSED]!==false) t+='<td class="col-extra">'+esc(meta.tipoSped)+'</td>';
        if(vis[SLOT.AWB]!==false)     t+='<td class="col-awb">'+esc(meta.awb)+'</td>';
        for(var c=1;c<nc_file;c++){
            if(vis[SLOT.FILE_START+c]===false) continue;
            var v=row[c]!==undefined?row[c]:'';
            t+='<td>'+esc(String(v===null||v===undefined?'':v))+'</td>';
        }
        t+='</tr>';
    });
    t+='</tbody></table></div></div>';
    return info+t;
}

/* ================================================================
   TABS
================================================================ */
function switchTab(id){
    activeTab=id;
    document.querySelectorAll('.ib-tab').forEach(function(b){ b.classList.toggle('active',b.dataset.tab===id); });
    document.querySelectorAll('.tab-panel').forEach(function(p){ p.classList.remove('on'); });
    var p=document.getElementById('panel-'+id); if(p) p.classList.add('on');
    document.getElementById('content').parentElement.scrollTop=0;
    refreshColPanel();
}

/* ================================================================
   FILTRI
================================================================ */
function populateFilters(intRows){
    var plants={},commesse={},tipi={},destini={};
    intRows.forEach(function(r){
        var p=String(r[5]||'').trim(),c=String(r[7]||'').trim(),
            t=String(r[6]||'').trim(),d=String(r[8]||'').trim();
        if(p) plants[p]=true; if(c) commesse[c]=true;
        if(t) tipi[t]=true;   if(d) destini[d]=true;
    });
    fillSel('fPlant',plants,'Tutti'); fillSel('fCommessa',commesse,'Tutte');
    fillSel('fTipo',tipi,'Tutti');    fillSel('fDestino',destini,'Tutti');
    ['plant','commessa','tipo','destino'].forEach(syncSelVal);
}
function fillSel(id,obj,ph){
    var sel=document.getElementById(id),prev=sel.value;
    sel.innerHTML='<option value="">'+ph+'</option>';
    Object.keys(obj).sort().forEach(function(v){
        var o=document.createElement('option'); o.value=v; o.textContent=v;
        if(v===prev) o.selected=true; sel.appendChild(o);
    });
    if(prev&&sel.value!==prev) sel.value='';
}
function resetFiltri(){
    ['fPlant','fCommessa','fTipo','fDestino'].forEach(function(id){ document.getElementById(id).value=''; });
    ['plant','commessa','tipo','destino'].forEach(syncSelVal);
    if(currentData){colVis={};render();}
}

/* ================================================================
   PARSE XLSX
================================================================ */
function parseXlsx(blob){
    return new Promise(function(resolve,reject){
        var reader=new FileReader();
        reader.onload=function(e){
            try{
                var wb=XLSX.read(new Uint8Array(e.target.result),{type:'array',cellDates:true});
                var out={};
                SHEET_NAMES.forEach(function(sn){
                    var rn=wb.SheetNames.find(function(n){ return n.trim().toLowerCase()===sn.trim().toLowerCase(); });
                    if(!rn){out[sn]={headers:[],rows:[]};return;}
                    var raw=XLSX.utils.sheet_to_json(wb.Sheets[rn],{header:1,defval:''});
                    var rows=[];
                    for(var i=2;i<raw.length;i++){
                        var row=raw[i];
                        if(!row.some(function(c){return c!=='';})) continue;
                        rows.push(row.map(function(c){return c instanceof Date?fmtDate(c):c;}));
                    }
                    out[sn]={headers:raw.slice(0,2),rows:rows};
                });
                resolve(out);
            }catch(err){reject(err);}
        };
        reader.onerror=reject;
        reader.readAsArrayBuffer(blob);
    });
}

/* DRIVE */
function listFiles(q){
  function fetchPage(pageToken){
    var url='https://www.googleapis.com/drive/v3/files?q='+encodeURIComponent(q)+'&fields=files(id,name),nextPageToken&pageSize=1000';
    if(pageToken) url+='&pageToken='+encodeURIComponent(pageToken);
    return gFetch(url).then(function(r){
      var files=r.files||[];
      if(r.nextPageToken) return fetchPage(r.nextPageToken).then(function(more){ return files.concat(more); });
      return files;
    });
  }
  return fetchPage(null);
}
function downloadFile(id){
    return fetch('https://www.googleapis.com/drive/v3/files/'+id+'?alt=media',{headers:{Authorization:'Bearer '+TOKEN}})
           .then(function(r){if(!r.ok) throw new Error('Download fallito: '+r.status); return r.blob();});
}
function gFetch(url){
    if(!TOKEN) return Promise.reject(new Error('No token'));
    return fetch(url,{headers:{Authorization:'Bearer '+TOKEN}}).then(function(r){return r.json();});
}

/* UTILITY */
function setContent(h){document.getElementById('content').innerHTML=h;}
function spinHtml(msg){return '<div class="loading-state"><div class="spinner"></div>'+esc(msg)+'</div>';}
function norm(v){if(v===null||v===undefined)return'';var s=String(v).trim();if(/^\d+\.0+$/.test(s))s=s.replace(/\.0+$/,'');return s;}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmtDate(d){return('0'+d.getDate()).slice(-2)+'/'+('0'+(d.getMonth()+1)).slice(-2)+'/'+d.getFullYear();}
function fmtD(s){return s.substr(6,2)+'/'+s.substr(4,2)+'/'+s.substr(0,4);}
