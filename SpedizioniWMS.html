<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Storico Spedizioni · ATS14</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📜</text></svg>">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
/* ================================================================
   BASE
================================================================ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: #dfe4ee; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 14px; color: #1c1c1e; overflow-x: hidden; -webkit-font-smoothing: antialiased; }

/* ---- LOGIN ---- */
#loginScreen { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #dfe4ee; }
.login-card { background: white; border-radius: 20px; padding: 40px 32px; text-align: center; max-width: 360px; width: 90%; box-shadow: 0 4px 24px rgba(0,0,0,.12); }
.login-icon { font-size: 48px; margin-bottom: 10px; display: block; }
.login-title { font-size: 20px; font-weight: 800; color: #1e3a5f; margin-bottom: 4px; }
.login-sub { font-size: 12px; color: #8e8e93; margin-bottom: 28px; }
.btn-google { display: inline-flex; align-items: center; gap: 10px; background: white; color: #1c1c1e; border: 1.5px solid #e5e5ea; border-radius: 12px; padding: 12px 22px; font-size: 14px; font-weight: 600; cursor: pointer; width: 100%; justify-content: center; font-family: inherit; box-shadow: 0 1px 6px rgba(0,0,0,.07); transition: all .2s; }
.btn-google:hover { background: #f9f9f9; }
.btn-google svg { width: 18px; height: 18px; flex-shrink: 0; }
.login-note { font-size: 11px; color: #c7c7cc; margin-top: 14px; line-height: 1.5; }

/* ---- APP SHELL ---- */
#appShell { display: none; flex-direction: column; height: 100vh; overflow: hidden; }

/* ================================================================
   TOPBAR
================================================================ */
.topbar {
    background: linear-gradient(135deg, #1e3a5f 0%, #2d5986 100%);
    padding: 0 12px;
    display: flex; align-items: center; gap: 8px;
    flex-shrink: 0;
    box-shadow: 0 2px 10px rgba(0,0,0,.25);
    z-index: 100;
    min-height: 46px;
    flex-wrap: wrap;
}
.topbar-logo { font-size: 15px; font-weight: 800; color: white; letter-spacing: .2px; flex-shrink: 0; white-space: nowrap; padding: 8px 0; }
.topbar-logo span { opacity: .6; font-weight: 500; }

/* FILTER BAR */
.filter-bar { display: flex; align-items: center; gap: 5px; flex: 1; flex-wrap: wrap; padding: 5px 0; min-width: 0; }

/* Ogni gruppo filtro è cliccabile su tutta la sua area */
.fg {
    display: flex; flex-direction: column; gap: 1px;
    background: rgba(255,255,255,.12);
    border-radius: 7px; padding: 4px 8px;
    cursor: pointer;
    transition: background .15s;
    flex: 1; min-width: 80px;
    position: relative;
}
.fg:hover { background: rgba(255,255,255,.2); }

/* Cliccando ovunque nel .fg si apre il select/input */
.fg-clickable { position: absolute; inset: 0; z-index: 1; cursor: pointer; }

.fl { font-size: 9px; font-weight: 700; color: rgba(255,255,255,.5); text-transform: uppercase; letter-spacing: .6px; white-space: nowrap; position: relative; z-index: 2; pointer-events: none; }

.filter-input, .filter-select {
    border: none; outline: none;
    font-size: 12px; font-weight: 600; color: white;
    background: transparent; width: 100%; font-family: inherit;
    -webkit-appearance: none; padding: 0; cursor: pointer;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    position: relative; z-index: 2;
}
.filter-input::placeholder { color: rgba(255,255,255,.35); }

/* Freccia select visibile e bianca */
.select-wrapper { position: relative; width: 100%; z-index: 2; }
.select-wrapper::after {
    content: '▾';
    position: absolute;
    right: 0; top: 50%;
    transform: translateY(-50%);
    color: rgba(255,255,255,.7);
    font-size: 10px;
    pointer-events: none;
}
.select-wrapper .filter-select { padding-right: 14px; }

option { background: #1e3a5f; color: white; }
.btn-cerca { background: rgba(255,255,255,.2); color: white; border: 1.5px solid rgba(255,255,255,.35); border-radius: 7px; padding: 6px 12px; font-size: 12px; font-weight: 700; cursor: pointer; font-family: inherit; white-space: nowrap; flex-shrink: 0; transition: background .15s; }
.btn-cerca:hover { background: rgba(255,255,255,.3); }
.btn-cerca:disabled { opacity: .35; cursor: not-allowed; }
.btn-reset { background: none; color: rgba(255,255,255,.7); border: 1px solid rgba(255,255,255,.3); border-radius: 7px; padding: 6px 9px; font-size: 12px; cursor: pointer; font-family: inherit; flex-shrink: 0; transition: all .15s; }
.btn-reset:hover { color: white; border-color: rgba(255,255,255,.5); }

/* Utente */
.topbar-right { display: flex; align-items: center; gap: 6px; flex-shrink: 0; padding: 5px 0; }
.user-badge { display: flex; align-items: center; gap: 6px; background: rgba(255,255,255,.12); border-radius: 20px; padding: 3px 9px 3px 5px; font-size: 11px; color: rgba(255,255,255,.85); }
.user-avatar { width: 20px; height: 20px; border-radius: 50%; object-fit: cover; }
.user-avatar-fallback { width: 20px; height: 20px; border-radius: 50%; background: rgba(255,255,255,.22); display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 700; color: white; }
.btn-logout { background: rgba(255,255,255,.12); border: none; border-radius: 6px; padding: 5px 9px; font-size: 11px; color: rgba(255,255,255,.7); cursor: pointer; font-family: inherit; transition: background .2s; }
.btn-logout:hover { background: rgba(255,255,255,.22); color: white; }

/* ================================================================
   INFOBAR
================================================================ */
.infobar {
    display: none;
    background: white;
    border-bottom: 1px solid #d1d8e8;
    padding: 0 12px;
    align-items: center;
    gap: 0;
    flex-shrink: 0;
    min-height: 38px;
    box-shadow: 0 1px 4px rgba(0,0,0,.06);
}
.infobar.show { display: flex; }

.ib-stats { display: flex; gap: 0; flex-shrink: 0; }
.ib-stat { display: flex; flex-direction: column; align-items: center; padding: 6px 14px 6px 0; margin-right: 14px; border-right: 1px solid #e5e5ea; }
.ib-stat:last-of-type { border-right: none; margin-right: 0; padding-right: 0; }
.ib-val { font-size: 16px; font-weight: 800; color: #1e3a5f; line-height: 1; }
.ib-lbl { font-size: 9px; font-weight: 600; color: #8e8e93; text-transform: uppercase; letter-spacing: .4px; margin-top: 1px; }

.ib-div { width: 1px; background: #e5e5ea; align-self: stretch; margin: 6px 10px; flex-shrink: 0; }

/* Tab buttons — Intestazione rimossa, ora solo Carico e ODP */
.ib-tabs { display: flex; gap: 2px; flex: 1; }
.ib-tab { flex: 1; padding: 6px 8px; border: none; background: none; font-size: 12px; font-weight: 600; color: #8e8e93; cursor: pointer; border-bottom: 2.5px solid transparent; transition: all .2s; display: flex; align-items: center; justify-content: center; gap: 3px; font-family: inherit; white-space: nowrap; }
.ib-tab.active { color: #007aff; border-bottom-color: #007aff; }
.badge { background: #e5e5ea; color: #8e8e93; border-radius: 8px; padding: 1px 5px; font-size: 10px; font-weight: 700; min-width: 16px; text-align: center; }
.ib-tab.active .badge { background: #e8f4ff; color: #007aff; }

/* ================================================================
   SCROLL AREA
================================================================ */
.scroll-area { flex: 1; overflow-y: auto; padding: 8px 10px 16px; -webkit-overflow-scrolling: touch; min-height: 0; }

/* ----------------------------------------------------------------
   COL TOGGLE — nascosta, appare su click del bottone "..."
---------------------------------------------------------------- */
.col-toggle-wrap {
    margin-bottom: 6px;
    position: relative;
}

/* bottone trigger "..." */
.ct-trigger {
    background: white;
    border: 1px solid #d1d8e8;
    border-radius: 8px;
    padding: 4px 10px;
    font-size: 12px;
    font-weight: 700;
    color: #8e8e93;
    cursor: pointer;
    font-family: inherit;
    transition: all .15s;
    display: inline-flex;
    align-items: center;
    gap: 5px;
    margin-bottom: 4px;
}
.ct-trigger:hover { border-color: #007aff; color: #007aff; background: #f0f8ff; }
.ct-trigger.open { border-color: #007aff; color: #007aff; background: #e8f4ff; }

/* pannello colonne — nascosto di default */
.ct-panel {
    display: none;
    background: white;
    border: 1px solid #d1d8e8;
    border-radius: 10px;
    padding: 8px 10px;
    box-shadow: 0 4px 16px rgba(0,0,0,.1);
    position: absolute;
    top: 100%;
    left: 0;
    z-index: 50;
    min-width: 260px;
    max-width: 100%;
}
.ct-panel.show { display: block; }

.ct-row { display: flex; gap: 4px; flex-wrap: wrap; align-items: center; }
.ct-label { font-size: 10px; font-weight: 700; color: #8e8e93; text-transform: uppercase; letter-spacing: .4px; flex-shrink: 0; margin-right: 2px; width: 100%; margin-bottom: 4px; }
.ct-btn { border: 1px solid #d1d8e8; background: white; border-radius: 20px; padding: 3px 9px; font-size: 11px; font-weight: 600; color: #8e8e93; cursor: pointer; font-family: inherit; transition: all .15s; white-space: nowrap; }
.ct-btn:hover { border-color: #007aff; color: #007aff; }
.ct-btn.on { background: #007aff; border-color: #007aff; color: white; }
.ct-btn.dest { background: #e8f4ff; border-color: #b3d7ff; color: #007aff; }
.ct-btn.dest.on { background: #007aff; color: white; }

/* ---- RESULTS INFO ---- */
.results-info { font-size: 11px; color: #8e8e93; text-align: right; padding: 2px 2px 5px; }

/* ---- TABLE ---- */
.tab-panel { display: none; }
.tab-panel.on { display: block; }
.tbl-card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,.07); }
.tbl-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 12px; }
thead tr:first-child th { font-size: 9px; font-weight: 700; letter-spacing: .7px; text-transform: uppercase; color: #8e8e93; padding: 7px 10px 2px; border-right: .5px solid #e5e5ea; background: #f4f6fa; white-space: nowrap; }
thead tr:last-child th { font-size: 11px; font-weight: 600; color: #3c3c43; padding: 2px 10px 7px; border-right: .5px solid #e5e5ea; background: #f4f6fa; white-space: nowrap; border-bottom: 1px solid #d8dde8; }
thead th:last-child { border-right: none !important; }
tbody tr { border-bottom: .5px solid #e8ecf2; transition: background .1s; }
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: rgba(0,122,255,.04); }
td { padding: 7px 10px; border-right: .5px solid #ebeef4; white-space: nowrap; max-width: 180px; overflow: hidden; text-overflow: ellipsis; font-size: 12px; color: #1c1c1e; }
td:last-child { border-right: none; }
td.dn { font-size: 10px; color: #8e8e93; }
td.dest-col { font-size: 11px; font-weight: 600; color: #1e3a5f; max-width: 140px; }

/* Colonne aggiuntive intestazione nella tab Carico/ODP */
td.meta-col { font-size: 11px; color: #5a6a8a; font-weight: 500; }

/* ---- STATI ---- */
.empty-state { text-align: center; padding: 36px 20px; color: #c7c7cc; }
.empty-icon { font-size: 38px; margin-bottom: 8px; display: block; }
.empty-title { font-weight: 600; color: #8e8e93; margin-bottom: 3px; font-size: 15px; }
.empty-sub { font-size: 12px; }
.loading-state { text-align: center; padding: 40px 20px; color: #8e8e93; font-size: 13px; }
.spinner { width: 28px; height: 28px; border: 3px solid #e5e5ea; border-top-color: #007aff; border-radius: 50%; animation: spin .7s linear infinite; margin: 0 auto 12px; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ---- LOGIN LAZY (per tab Storico) ---- */
#lazyLoginBanner {
    display: none;
    text-align: center;
    padding: 48px 20px;
}
#lazyLoginBanner.show { display: block; }
#lazyLoginBanner .lazy-icon { font-size: 44px; margin-bottom: 12px; display: block; }
#lazyLoginBanner .lazy-title { font-size: 17px; font-weight: 700; color: #1e3a5f; margin-bottom: 6px; }
#lazyLoginBanner .lazy-sub { font-size: 13px; color: #8e8e93; margin-bottom: 22px; }

::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #c1c8d8; border-radius: 2px; }

/* ================================================================
   RESPONSIVE
================================================================ */
@media (min-width: 768px) {
    .topbar { flex-wrap: nowrap; min-height: 46px; }
    .filter-bar { flex-wrap: nowrap; padding: 0; }
    .fg { min-width: 0; }
}
@media (max-width: 600px) {
    .fg { min-width: calc(33% - 4px); }
    .ib-stat { padding: 5px 10px 5px 0; margin-right: 10px; }
    .ib-val { font-size: 14px; }
}
</style>
</head>
<body>

<!-- ===== LOGIN (mostrato solo per tab Storico se non autenticato) ===== -->
<div id="loginScreen" style="display:none;">
    <div class="login-card">
        <span class="login-icon">📜</span>
        <div class="login-title">Storico Spedizioni</div>
        <div class="login-sub">ATS14 · Bollettazione</div>

            Accedi con Google

</div>

<!-- ===== APP ===== -->
<div id="appShell" style="display:flex;">

    <!-- ① TOPBAR -->
    <header class="topbar">
        <div class="topbar-logo">Storico <span>Sped.</span></div>
        <div class="filter-bar">
            <!-- Data -->
            <div class="fg" onclick="document.getElementById('fDate').focus()">

<script src="https://accounts.google.com/gsi/client" async defer></script>
<script>
/* ================================================================
   CONFIG
================================================================ */
var CLIENT_ID   = '256693770433-b1pjdpaglrh7827o6ln2s24802rcnshd.apps.googleusercontent.com';
var FOLDER_ID   = '1dSm4qSDB2cZ5WhwDf_40TF-K7sjwStg4';
// Intestazione inclusa nel parse ma NON mostrata come tab
var SHEET_NAMES = ['Intestazione','Dettagli Carico','Dettagli ODP'];

var TOKEN = null, currentData = null, currentDate = null;
// activeTab ora inizia su 'tc' (Carico) — 'ti' rimossa
var activeTab = 'tc';

// Flag: autenticazione richiesta solo per lo Storico
var authInitiated = false;

/* ================================================================
   COLUMN VISIBILITY
================================================================ */
var colVis = {};

function nc(s) { return String(s||'').toLowerCase().replace(/[_\s\-]/g,''); }

// Colonne visibili di default (nomi normalizzati)
// Carico: aggiunta commessa, AWB (visibile=false), tipo spedizione dal foglio Intestazione
var COL_DEF = {
    'dettaglicarico': ['__dest__','__commessa__','__tipospedizione__','linenum','imballo','qty','quantity','altezzacm','larghezzacm','profonditacm'],
    'dettagliodp':    ['__dest__','__commessa__','__tipospedizione__','linenum','odp','numeroodp']
};
// AWB nascosto di default: non è in COL_DEF, quindi parte off

function initColVis(sheetName, headers, hasDestCol) {
    if (colVis[sheetName]) return;
    var key = nc(sheetName);
    var defs = COL_DEF[key] || [];
    var h1 = (headers && headers[1]) ? headers[1] : [];
    var arr = [];

    // Colonne sintetiche da intestazione (Destino, Commessa, Tipo Spedizione, AWB)
    if (hasDestCol) {
        arr.push(defs.indexOf('__dest__') >= 0);           // 0 = Destino
        arr.push(defs.indexOf('__commessa__') >= 0);       // 1 = Commessa
        arr.push(defs.indexOf('__tipospedizione__') >= 0); // 2 = Tipo Spedizione
        arr.push(false);                                    // 3 = AWB nascosto di default
    }
    h1.forEach(function(h) {
        arr.push(defs.indexOf(nc(h)) >= 0);
    });
    colVis[sheetName] = arr;
}

function toggleCol(sheetName, colIdx) {
    if (!colVis[sheetName]) return;
    colVis[sheetName][colIdx] = !colVis[sheetName][colIdx];
    reRenderActive();
}

// Toggle pannello colonne (click su "...")
function toggleColPanel(sheetName) {
    var panelId = 'ctpanel-' + sheetName.replace(/\s/g,'');
    var btnId   = 'cttrig-'  + sheetName.replace(/\s/g,'');
    var panel = document.getElementById(panelId);
    var btn   = document.getElementById(btnId);
    if (!panel) return;
    var isOpen = panel.classList.contains('show');
    // Chiudi tutti gli altri pannelli
    document.querySelectorAll('.ct-panel').forEach(function(p){ p.classList.remove('show'); });
    document.querySelectorAll('.ct-trigger').forEach(function(b){ b.classList.remove('open'); });
    if (!isOpen) {
        panel.classList.add('show');
        if (btn) btn.classList.add('open');
    }
}

// Chiudi pannelli colonne cliccando fuori
document.addEventListener('click', function(e) {
    if (!e.target.closest('.col-toggle-wrap')) {
        document.querySelectorAll('.ct-panel').forEach(function(p){ p.classList.remove('show'); });
        document.querySelectorAll('.ct-trigger').forEach(function(b){ b.classList.remove('open'); });
    }
});

/* ================================================================
   AUTH — lazy: solo quando si accede allo Storico
   (rimosse dal codice le chiamate all'auth all'avvio)
================================================================ */
window.onload = function () {
    // Apre direttamente l'app senza richiedere login
    document.getElementById('appShell').style.display = 'flex';
    document.getElementById('loginScreen').style.display = 'none';
    // Carica la lista date (non richiede auth per la topbar filtri)
    // ma i dati richiedono token → il pulsante Carica resterà disabilitato
    // finché non si fa login via tab Storico
    waitGsi(false);
};

var tokenClient;
function waitGsi(doAuth) {
    if (typeof google === 'undefined') { setTimeout(function(){ waitGsi(doAuth); }, 150); return; }
    tokenClient = google.accounts.oauth2.initTokenClient({
        client_id: CLIENT_ID,
        scope: 'https://www.googleapis.com/auth/drive.readonly https://www.googleapis.com/auth/userinfo.profile https://www.googleapis.com/auth/userinfo.email',
        callback: onToken
    });
    if (doAuth) {
        var saved = getSaved();
        tokenClient.requestAccessToken({ prompt: '', login_hint: (saved && saved.email) ? saved.email : '' });
    }
}

// Chiamato solo quando utente clicca "Accedi" nel banner lazy o ha già un token salvato
function signIn() {
    document.getElementById('loginScreen').style.display = 'none';
    if (!tokenClient) { waitGsi(true); return; }
    var saved = getSaved();
    tokenClient.requestAccessToken({ prompt: 'select_account', login_hint: (saved && saved.email) ? saved.email : '' });
}

function signOut() {
    if (TOKEN) google.accounts.oauth2.revoke(TOKEN, function () {});
    TOKEN = null; currentData = null;
    localStorage.removeItem('vdc_storico_session');
    document.getElementById('infobar').classList.remove('show');
    document.getElementById('userBadge').style.display = 'none';
    document.getElementById('btnLogout').style.display = 'none';
    setContent('<div class="empty-state"><span class="empty-icon">🔍</span><div class="empty-title">Nessun dato caricato</div><div class="empty-sub">Seleziona la data e premi Carica</div></div>');
}

function onToken(resp) {
    if (resp.error) { return; }
    TOKEN = resp.access_token;
    document.getElementById('userBadge').style.display = 'flex';
    document.getElementById('btnLogout').style.display = 'block';
    loadUserInfo();
    loadDates();
    // Se l'utente era in attesa della tab Storico, carica i dati automaticamente
    if (authInitiated) { authInitiated = false; loadData(); }
}

/* ================================================================
   SESSION
================================================================ */
function getSaved()        { try { var s = localStorage.getItem('vdc_storico_session'); return s ? JSON.parse(s) : null; } catch(e) { return null; } }
function setSaved(n, e, p) { try { localStorage.setItem('vdc_storico_session', JSON.stringify({ name: n, email: e, picture: p })); } catch(e) {} }

/* ================================================================
   USER UI
================================================================ */
function loadUserInfo() {
    gFetch('https://www.googleapis.com/oauth2/v2/userinfo').then(function (u) {
        if (u.error) return;
        setSaved(u.name || u.email || '', u.email || '', u.picture || '');
        setUserUI(u.name || u.email || '—', u.picture || '');
    }).catch(function () {});
}
function setUserUI(name, picture) {
    document.getElementById('userName').textContent = name || '—';
    var wrap = document.getElementById('userAvatarWrap'); wrap.innerHTML = '';
    if (picture) {
        var img = document.createElement('img'); img.className = 'user-avatar'; img.referrerPolicy = 'no-referrer'; img.src = picture;
        img.onerror = function () { wrap.innerHTML = makeInitial(name); };
        wrap.appendChild(img);
    } else { wrap.innerHTML = makeInitial(name); }
    document.getElementById('userBadge').style.display = 'flex';
    document.getElementById('btnLogout').style.display = 'block';
}
function makeInitial(str) { return '<div class="user-avatar-fallback">' + ((str||'?').trim().charAt(0).toUpperCase()) + '</div>'; }

/* ================================================================
   DATE
================================================================ */
function extractDate(name) { var m = name.match(/(\d{8})\.xlsx$/i); return m ? m[1] : null; }

function loadDates() {
    listFiles('"' + FOLDER_ID + '" in parents and mimeType="application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" and trashed=false')
    .then(function (files) {
        var set = {};
        files.forEach(function (f) { var d = extractDate(f.name); if (d) set[d] = true; });
        var dates = Object.keys(set).sort().reverse();
        var dl = document.getElementById('listDates');
        dates.forEach(function (d) {
            var txt = d.substr(6,2) + '/' + d.substr(4,2) + '/' + d.substr(0,4);
            var o = document.createElement('option'); o.value = txt; dl.appendChild(o);
        });
        if (!dates.length) return;
        var now = new Date();
        var todayStr = now.getFullYear().toString() + ('0'+(now.getMonth()+1)).slice(-2) + ('0'+now.getDate()).slice(-2);
        var pick = (dates.indexOf(todayStr) >= 0) ? todayStr : dates[0];
        document.getElementById('fDate').value = pick.substr(6,2) + '/' + pick.substr(4,2) + '/' + pick.substr(0,4);
        document.getElementById('btnCerca').disabled = false;
        loadData();
    }).catch(function () {});
}

function parseDate(str) {
    str = (str||'').trim();
    var m = str.match(/^(\d{2})\/(\d{2})\/(\d{4})$/);
    if (m) return m[3] + m[2] + m[1];
    if (/^\d{8}$/.test(str)) return str;
    return null;
}

document.getElementById('fDate').addEventListener('input', function () {
    document.getElementById('btnCerca').disabled = !parseDate(this.value);
});

/* ================================================================
   CARICA DATI
   Se non autenticato → mostra banner login lazy
================================================================ */
function loadData() {
    // Se non abbiamo token, mostra il banner di login lazy
    if (!TOKEN) {
        showLazyLogin();
        return;
    }

    var dateStr = parseDate(document.getElementById('fDate').value);
    if (!dateStr) return;
    currentDate = dateStr; currentData = null;
    colVis = {};

    document.getElementById('infobar').classList.remove('show');
    setContent(spinHtml('Ricerca file per ' + fmtD(dateStr) + '…'));

    listFiles('"' + FOLDER_ID + '" in parents and mimeType="application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" and trashed=false')
    .then(function (files) {
        files = files.filter(function (f) { return extractDate(f.name) === dateStr; });
        if (!files.length) throw new Error('Nessun file trovato per il ' + fmtD(dateStr));
        setContent(spinHtml('Download ' + files.length + ' file…'));
        return Promise.all(files.map(function (f) { return downloadFile(f.id).then(function (b) { return { blob: b }; }); }));
    })
    .then(function (results) {
        setContent(spinHtml('Elaborazione…'));
        return Promise.all(results.map(function (r) { return parseXlsx(r.blob); }));
    })
    .then(function (parsed) {
        var merged = {}; SHEET_NAMES.forEach(function (sn) { merged[sn] = { headers: [], rows: [] }; });
        var hSet = false;
        parsed.forEach(function (p) {
            SHEET_NAMES.forEach(function (sn) {
                var sd = p[sn] || { headers: [], rows: [] };
                if (!hSet && sd.headers.length) merged[sn].headers = sd.headers;
                merged[sn].rows = merged[sn].rows.concat(sd.rows);
            });
            hSet = true;
        });
        SHEET_NAMES.forEach(function (sn) {
            merged[sn].rows.sort(function (a, b) { return String(a[0]||'').localeCompare(String(b[0]||''), undefined, { numeric: true }); });
        });
        currentData = merged;
        populateFilters(merged['Intestazione'].rows);
        render();
    })
    .catch(function (e) {
        setContent('<div class="empty-state"><span class="empty-icon">⚠️</span><div class="empty-title">Errore</div><div class="empty-sub">' + esc(e.message) + '</div></div>');
    });
}

/* ================================================================
   RENDER
================================================================ */
function render() {
    if (!currentData) return;

    var fPlant    = document.getElementById('fPlant').value.trim();
    var fCommessa = document.getElementById('fCommessa').value.trim();
    var fTipo     = document.getElementById('fTipo').value.trim();
    var fDestino  = document.getElementById('fDestino').value.trim();

    var ok = {};
    currentData['Intestazione'].rows.forEach(function (r) {
        if (fPlant    && String(r[5]||'').trim() !== fPlant)    return;
        if (fCommessa && String(r[7]||'').trim() !== fCommessa) return;
        if (fTipo     && String(r[6]||'').trim() !== fTipo)     return;
        if (fDestino  && String(r[8]||'').trim() !== fDestino)  return;
        ok[norm(r[0])] = true;
    });

    // Intestazione esclusa dalla vista ma usata per dati ausiliari
    var fCar = currentData['Dettagli Carico'].rows.filter(function (r) { return ok[norm(r[0])]; });
    var fOdp = currentData['Dettagli ODP'].rows.filter(function (r) { return ok[norm(r[0])]; });
    var fInt = currentData['Intestazione'].rows.filter(function (r) { return ok[norm(r[0])]; });

    // Aggiorna infobar
    document.getElementById('sDoc').textContent = fInt.length;
    document.getElementById('sCar').textContent = fCar.length;
    document.getElementById('sOdp').textContent = fOdp.length;
    document.getElementById('cnt-tc').textContent = fCar.length;
    document.getElementById('cnt-to').textContent = fOdp.length;
    document.getElementById('infobar').classList.add('show');

    // Mappa destino, commessa, tipo spedizione, AWB per docnum
    var metaMap = {};
    currentData['Intestazione'].rows.forEach(function (r) {
        var dn = norm(r[0]);
        metaMap[dn] = {
            destino:        String(r[8]||'').trim(),
            commessa:       String(r[7]||'').trim(),
            tipoSpedizione: String(r[6]||'').trim(),
            awb:            String(r[3]||'').trim()   // AWB — col indice 3 (U_AWB)
        };
    });

    // Inizializza visibilità colonne
    initColVis('Dettagli Carico', currentData['Dettagli Carico'].headers, true);
    initColVis('Dettagli ODP',    currentData['Dettagli ODP'].headers,    true);

    var html = '';
    html += '<div id="panel-tc" class="tab-panel' + (activeTab==='tc'?' on':'') + '">'
          + buildPanel('Dettagli Carico', currentData['Dettagli Carico'].headers, fCar, false, metaMap, fCar.length) + '</div>';
    html += '<div id="panel-to" class="tab-panel' + (activeTab==='to'?' on':'') + '">'
          + buildPanel('Dettagli ODP',    currentData['Dettagli ODP'].headers,    fOdp, false, metaMap, fOdp.length) + '</div>';

    setContent(html);
    document.querySelectorAll('.ib-tab').forEach(function (b) { b.classList.toggle('active', b.dataset.tab === activeTab); });
}

function reRenderActive() {
    if (!currentData) return;
    var map = { tc: 'Dettagli Carico', to: 'Dettagli ODP' };
    var sn = map[activeTab];
    if (!sn) return;
    var panel = document.getElementById('panel-' + activeTab);
    if (!panel) return;

    var fPlant    = document.getElementById('fPlant').value.trim();
    var fCommessa = document.getElementById('fCommessa').value.trim();
    var fTipo     = document.getElementById('fTipo').value.trim();
    var fDestino  = document.getElementById('fDestino').value.trim();
    var ok = {};
    currentData['Intestazione'].rows.forEach(function (r) {
        if (fPlant    && String(r[5]||'').trim() !== fPlant)    return;
        if (fCommessa && String(r[7]||'').trim() !== fCommessa) return;
        if (fTipo     && String(r[6]||'').trim() !== fTipo)     return;
        if (fDestino  && String(r[8]||'').trim() !== fDestino)  return;
        ok[norm(r[0])] = true;
    });
    var rows = currentData[sn].rows.filter(function (r) { return ok[norm(r[0])]; });

    var metaMap = {};
    currentData['Intestazione'].rows.forEach(function (r) {
        var dn = norm(r[0]);
        metaMap[dn] = {
            destino:        String(r[8]||'').trim(),
            commessa:       String(r[7]||'').trim(),
            tipoSpedizione: String(r[6]||'').trim(),
            awb:            String(r[3]||'').trim()
        };
    });
    panel.innerHTML = buildPanel(sn, currentData[sn].headers, rows, false, metaMap, rows.length);
}

/* ================================================================
   BUILD PANEL
   hasDestCol = true per Carico e ODP
   metaMap    = { docnum: { destino, commessa, tipoSpedizione, awb } }

   Colonne sintetiche (visIdx 0-3 quando hasDestCol):
     0 = Destino
     1 = Commessa
     2 = Tipo Spedizione
     3 = AWB (nascosto di default)
   Poi le colonne del file (visIdx 4+)
================================================================ */
function buildPanel(sheetName, headers, rows, isInt, metaMap, total) {
    var h1 = (headers && headers[1]) ? headers[1] : [];
    var hasDestCol = !isInt;
    var vis = colVis[sheetName] || [];

    var snSafe = sheetName.replace(/[\s']/g, '_');

    // ---- Col toggle trigger + pannello ----
    var togHtml = '<div class="col-toggle-wrap">';
    togHtml += '<button class="ct-trigger" id="cttrig-' + snSafe + '" onclick="toggleColPanel(\'' + snSafe + '\')" title="Mostra/nascondi colonne">⚙️ Colonne <span style="font-size:9px;opacity:.6;">▾</span></button>';
    togHtml += '<div class="ct-panel" id="ctpanel-' + snSafe + '">';
    togHtml += '<div class="ct-row"><span class="ct-label">Colonne visibili</span>';

    // Bottoni colonne sintetiche
    if (hasDestCol) {
        var labels = ['📍 Destino','📋 Commessa','🚚 Tipo Sped.','✈️ AWB'];
        for (var si = 0; si < 4; si++) {
            var isOnS = vis[si] !== false && vis[si] !== undefined ? vis[si] : (si < 3);
            togHtml += '<button class="ct-btn' + (isOnS?' on':'') + '" onclick="toggleCol(\'' + snSafe + '\',' + si + ')">' + labels[si] + '</button>';
        }
    }
    // Bottoni colonne del file
    h1.forEach(function(hname, ci) {
        var visIdx = hasDestCol ? ci + 4 : ci;
        var isOn2 = vis[visIdx] !== false && vis[visIdx] !== undefined ? vis[visIdx] : false;
        togHtml += '<button class="ct-btn' + (isOn2?' on':'') + '" onclick="toggleCol(\'' + snSafe + '\',' + visIdx + ')">' + esc(String(hname||'')) + '</button>';
    });
    togHtml += '</div></div></div>'; // ct-row, ct-panel, col-toggle-wrap

    if (!rows.length) {
        return togHtml + '<div class="empty-state"><span class="empty-icon">📭</span><div class="empty-title">Nessun dato</div><div class="empty-sub">Prova a modificare i filtri</div></div>';
    }

    var infoHtml = '<div class="results-info">' + total + ' riga' + (total !== 1 ? 'he' : '') + '</div>';

    var h0 = (headers && headers[0]) ? headers[0] : [];
    var nc_cnt = Math.max(h1.length, rows[0] ? rows[0].length : 0);

    var tHtml = '<div class="tbl-card"><div class="tbl-wrap"><table><thead>';

    // Header riga 1 (tecnica)
    if (h0.length) {
        tHtml += '<tr>';
        if (hasDestCol) {
            var tech = ['DESTINO','COMMESSA','TIPO_SPED','AWB'];
            for (var ts = 0; ts < 4; ts++) {
                if (!getVis(vis, ts, ts < 3)) continue;
                tHtml += '<th>' + tech[ts] + '</th>';
            }
        }
        for (var c = 0; c < nc_cnt; c++) {
            var vi1 = hasDestCol ? c + 4 : c;
            if (!getVis(vis, vi1, false)) continue;
            tHtml += '<th>' + esc(String(h0[c]||'')) + '</th>';
        }
        tHtml += '</tr>';
    }
    // Header riga 2 (leggibile)
    if (h1.length) {
        tHtml += '<tr>';
        if (hasDestCol) {
            var readable = ['Destino','Commessa','Tipo Sped.','AWB'];
            for (var rs = 0; rs < 4; rs++) {
                if (!getVis(vis, rs, rs < 3)) continue;
                tHtml += '<th>' + readable[rs] + '</th>';
            }
        }
        for (var c = 0; c < nc_cnt; c++) {
            var vi2 = hasDestCol ? c + 4 : c;
            if (!getVis(vis, vi2, false)) continue;
            tHtml += '<th>' + esc(String(h1[c]||'')) + '</th>';
        }
        tHtml += '</tr>';
    }
    tHtml += '</thead><tbody>';

    rows.forEach(function (row) {
        var dn = norm(row[0]);
        var meta = (metaMap && metaMap[dn]) ? metaMap[dn] : { destino:'', commessa:'', tipoSpedizione:'', awb:'' };
        tHtml += '<tr>';
        if (hasDestCol) {
            var vals = [meta.destino, meta.commessa, meta.tipoSpedizione, meta.awb];
            for (var ms = 0; ms < 4; ms++) {
                if (!getVis(vis, ms, ms < 3)) continue;
                tHtml += '<td class="meta-col">' + esc(vals[ms]) + '</td>';
            }
        }
        for (var c = 0; c < nc_cnt; c++) {
            var vi3 = hasDestCol ? c + 4 : c;
            if (!getVis(vis, vi3, false)) continue;
            var v = row[c] !== undefined ? row[c] : '';
            tHtml += '<td' + (c===0?' class="dn"':'') + '>' + esc(String(v===null||v===undefined?'':v)) + '</td>';
        }
        tHtml += '</tr>';
    });
    tHtml += '</tbody></table></div></div>';

    return togHtml + infoHtml + tHtml;
}

// Helper: legge visibilità con fallback
function getVis(vis, idx, defaultVal) {
    if (vis[idx] === undefined) return defaultVal;
    return vis[idx] !== false;
}

/* ================================================================
   TABS — solo tc e to
================================================================ */
function switchTab(id) {
    activeTab = id;
    document.querySelectorAll('.ib-tab').forEach(function (b) { b.classList.toggle('active', b.dataset.tab === id); });
    document.querySelectorAll('.tab-panel').forEach(function (p) { p.classList.remove('on'); });
    var p = document.getElementById('panel-' + id);
    if (p) p.classList.add('on');
    document.getElementById('content').parentElement.scrollTop = 0;
}

/* ================================================================
   FILTRI DINAMICI
================================================================ */
function populateFilters(intRows) {
    var plants={}, commesse={}, tipi={}, destini={};
    intRows.forEach(function (r) {
        var p=String(r[5]||'').trim(), c=String(r[7]||'').trim(), t=String(r[6]||'').trim(), d=String(r[8]||'').trim();
        if(p) plants[p]=true; if(c) commesse[c]=true; if(t) tipi[t]=true; if(d) destini[d]=true;
    });
    fillSel('fPlant',    plants,   'Tutti');
    fillSel('fCommessa', commesse, 'Tutte');
    fillSel('fTipo',     tipi,     'Tutti');
    fillSel('fDestino',  destini,  'Tutti');
    ['fPlant','fCommessa','fTipo','fDestino'].forEach(function (id) {
        document.getElementById(id).onchange = function () { if (currentData) { colVis = {}; render(); } };
    });
}

function fillSel(id, obj, ph) {
    var sel = document.getElementById(id), prev = sel.value;
    sel.innerHTML = '<option value="">' + ph + '</option>';
    Object.keys(obj).sort().forEach(function (v) {
        var o = document.createElement('option'); o.value = v; o.textContent = v;
        if (v === prev) o.selected = true;
        sel.appendChild(o);
    });
    if (prev && sel.value !== prev) sel.value = '';
}

function resetFiltri() {
    ['fPlant','fCommessa','fTipo','fDestino'].forEach(function (id) { document.getElementById(id).value = ''; });
    if (currentData) { colVis = {}; render(); }
}

/* ================================================================
   PARSE XLSX
================================================================ */
function parseXlsx(blob) {
    return new Promise(function (resolve, reject) {
        var reader = new FileReader();
        reader.onload = function (e) {
            try {
                var wb = XLSX.read(new Uint8Array(e.target.result), { type: 'array', cellDates: true });
                var out = {};
                SHEET_NAMES.forEach(function (sn) {
                    var rn = wb.SheetNames.find(function (n) { return n.trim().toLowerCase() === sn.trim().toLowerCase(); });
                    if (!rn) { out[sn] = { headers: [], rows: [] }; return; }
                    var raw = XLSX.utils.sheet_to_json(wb.Sheets[rn], { header: 1, defval: '' });
                    var rows = [];
                    for (var i = 2; i < raw.length; i++) {
                        var row = raw[i];
                        if (!row.some(function (c) { return c !== ''; })) continue;
                        rows.push(row.map(function (c) { return c instanceof Date ? fmtDate(c) : c; }));
                    }
                    out[sn] = { headers: raw.slice(0, 2), rows: rows };
                });
                resolve(out);
            } catch (err) { reject(err); }
        };
        reader.onerror = reject;
        reader.readAsArrayBuffer(blob);
    });
}

/* ================================================================
   DRIVE API
================================================================ */
function listFiles(q) {
    return gFetch('https://www.googleapis.com/drive/v3/files?q=' + encodeURIComponent(q) + '&fields=files(id,name)&pageSize=200')
           .then(function (r) { return r.files || []; });
}
function downloadFile(id) {
    return fetch('https://www.googleapis.com/drive/v3/files/' + id + '?alt=media', { headers: { Authorization: 'Bearer ' + TOKEN } })
           .then(function (r) { if (!r.ok) throw new Error('Download fallito: ' + r.status); return r.blob(); });
}
function gFetch(url) {
    if (!TOKEN) return Promise.reject(new Error('No token'));
    return fetch(url, { headers: { Authorization: 'Bearer ' + TOKEN } }).then(function (r) { return r.json(); });
}

/* ================================================================
   UTILITY
================================================================ */
function setContent(h)  { document.getElementById('content').innerHTML = h; }
function spinHtml(msg)  { return '<div class="loading-state"><div class="spinner"></div>' + esc(msg) + '</div>'; }
function norm(v)        { if (v===null||v===undefined) return ''; var s=String(v).trim(); if(/^\d+\.0+$/.test(s)) s=s.replace(/\.0+$/,''); return s; }
function esc(s)         { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmtDate(d)     { return ('0'+d.getDate()).slice(-2)+'/'+('0'+(d.getMonth()+1)).slice(-2)+'/'+d.getFullYear(); }
function fmtD(s)        { return s.substr(6,2)+'/'+s.substr(4,2)+'/'+s.substr(0,4); }
